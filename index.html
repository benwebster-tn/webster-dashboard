function renderQhPhase0(container) {
  var isManual = qhState.manualMode;
  var grid = document.createElement("div");
  // In manual mode: form is wider (2fr) and upload is secondary (1fr)
  grid.style.cssText = isManual
    ? "display:grid;grid-template-columns:1fr 2fr;gap:18px;"
    : "display:grid;grid-template-columns:1fr 1fr;gap:18px;";

  var leftCard = document.createElement("div");
  leftCard.className = "card";
  if (isManual) {
    leftCard.style.opacity = "0.85";
    leftCard.innerHTML = '<div class="card-header"><span class="icon">\uD83D\uDCC4</span><span>Upload Documents</span>' +
      '<span style="font-size:10px;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,0.04);color:' + C.t3 + ';font-weight:600;margin-left:auto;">Optional</span></div>';
  } else {
    leftCard.innerHTML = '<div class="card-header"><span class="icon">\uD83D\uDCC4</span><span>Upload Documents</span>' +
      '<span style="font-size:10px;padding:2px 8px;border-radius:6px;background:rgba(79,140,255,0.12);color:' + C.blue + ';font-weight:600;margin-left:auto;">AI Extraction</span></div>';
  }

  var uploadZone = document.createElement("div");
  uploadZone.className = "qh-upload-zone";
  uploadZone.id = "qh-upload-zone";
  uploadZone.innerHTML = '<div class="qh-upload-icon">\uD83D\uDCC4</div>' +
    '<div class="qh-upload-text">Drag & drop dec pages, DLs, or documents here</div>' +
    '<div class="qh-upload-sub">PDF, JPG, PNG accepted -- AI extracts client data automatically<br><span style="color:' + C.blue + ';">Replaces email extraction -- no more sending docs via email</span></div>' +
    '<div class="qh-upload-or">\u2014 or \u2014</div>' +
    '<div class="qh-upload-browse">\uD83D\uDCC2 Choose Files to Upload</div>';
  leftCard.appendChild(uploadZone);

  var fileList = document.createElement("div");
  fileList.id = "qh-file-list";
  leftCard.appendChild(fileList);

  // Extraction status panel — shows real-time OCR progress
  var extractPanel = document.createElement("div");
  extractPanel.id = "qh-extract-panel";
  extractPanel.style.cssText = "margin-top:12px;display:none;padding:12px;background:rgba(255,255,255,0.02);border:1px solid #2a2d3a;border-radius:10px;";
  extractPanel.innerHTML = '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:' + C.blue + ';margin-bottom:8px;">Extraction Status</div>';
  leftCard.appendChild(extractPanel);

  // Wire up drag-and-drop + click-to-browse
  qhWireUploadZone(uploadZone, "qh-file-list", "files", function(fileObj) {
    var panel = document.getElementById("qh-extract-panel");
    if (!panel) return;
    panel.style.display = "block";

    if (fileObj.status === "error") {
      qhAddExtractLog(panel, "\u274C", fileObj.name + " -- " + (fileObj.errorMsg || "upload failed"), C.red);
      return;
    }

    // Check if AI-powered extraction was used
    if (fileObj.structuredData) {
      var sd = fileObj.structuredData;
      var clientName = sd.client ? ((sd.client.firstName || "") + " " + (sd.client.lastName || "")).trim() : "";
      var carrier = sd.currentCarrier || sd.carrier || "";
      var premium = sd.annualPremium ? "$" + Number(sd.annualPremium).toLocaleString() : "";
      var summaryParts = [clientName, carrier, premium].filter(function(s) { return s; });

      qhAddExtractLog(panel, "\uD83E\uDD16", fileObj.name + " -- AI extracted structured data", C.green);
      if (summaryParts.length > 0) {
        qhAddExtractLog(panel, "\uD83D\uDCCB", "Found: " + summaryParts.join(" | "), C.teal);
      }

      // Show vehicles if found
      if (sd.vehicles && sd.vehicles.length > 0) {
        var vehStr = sd.vehicles.map(function(v) { return [v.year, v.make, v.model].filter(function(s){return s;}).join(" "); }).join(", ");
        if (vehStr) qhAddExtractLog(panel, "\uD83D\uDE97", "Vehicles: " + vehStr, C.t2);
      }

      // Show coverages summary if found
      if (sd.coverages) {
        var covParts = [];
        function covStr(v) { return (v && typeof v !== "object") ? String(v) : (v ? JSON.stringify(v) : ""); }
        if (sd.coverages.bodilyInjury) covParts.push("BI: " + covStr(sd.coverages.bodilyInjury));
        if (sd.coverages.propertyDamage) covParts.push("PD: " + covStr(sd.coverages.propertyDamage));
        if (sd.coverages.dwelling) covParts.push("Dwelling: $" + covStr(sd.coverages.dwelling));
        if (sd.coverages.deductible) covParts.push("Ded: " + covStr(sd.coverages.deductible));
        if (covParts.length > 0) qhAddExtractLog(panel, "\uD83D\uDEE1\uFE0F", "Coverages: " + covParts.join(" | "), C.t2);
      }

      // Show raw text toggle too
      if (fileObj.extractedText) {
        var previewId = "qh-preview-" + fileObj.id;
        var toggleDiv = document.createElement("div");
        toggleDiv.style.cssText = "margin:4px 0 8px 24px;";
        toggleDiv.innerHTML = '<div style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;color:' + C.t3 + ';" onclick="var t=document.getElementById(\'' + previewId + '\');t.style.display=t.style.display===\'none\'?\'block\':\'none\';">\u25B6 Show raw OCR text</div>' +
          '<div id="' + previewId + '" style="display:none;margin-top:6px;padding:8px;background:rgba(0,0,0,0.2);border:1px solid #2a2d3a;border-radius:6px;font-size:10px;color:' + C.t3 + ';white-space:pre-wrap;max-height:150px;overflow-y:auto;font-family:monospace;">' + fileObj.extractedText.substring(0, 300).replace(/</g,"&lt;") + (fileObj.extractedText.length > 300 ? "..." : "") + '</div>';
        panel.appendChild(toggleDiv);
      }

      // Auto-fill form fields
      var filledFields = qhTryAutoFill(fileObj);
      if (filledFields && filledFields.length > 0) {
        qhAddExtractLog(panel, "\u2705", "Auto-filled " + filledFields.length + " field(s): " + filledFields.join(", "), C.green);
      }

    } else if (fileObj.extractedText) {
      // Fallback: OCR text but no AI — use regex
      var charCount = fileObj.extractedText.length;
      var preview = fileObj.extractedText.substring(0, 200).replace(/\n/g, " ").replace(/</g,"&lt;").trim();
      qhAddExtractLog(panel, "\uD83D\uDD0D", fileObj.name + " -- OCR extracted " + charCount + " chars (basic mode, no AI key set)", C.amber);

      var previewId = "qh-preview-" + fileObj.id;
      var toggleDiv = document.createElement("div");
      toggleDiv.style.cssText = "margin:4px 0 8px 24px;";
      toggleDiv.innerHTML = '<div style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;color:' + C.blue + ';" onclick="var t=document.getElementById(\'' + previewId + '\');t.style.display=t.style.display===\'none\'?\'block\':\'none\';">\u25B6 Show extracted text</div>' +
        '<div id="' + previewId + '" style="display:none;margin-top:6px;padding:8px;background:rgba(0,0,0,0.2);border:1px solid #2a2d3a;border-radius:6px;font-size:10px;color:' + C.t3 + ';white-space:pre-wrap;max-height:150px;overflow-y:auto;font-family:monospace;">' + preview + (charCount > 200 ? "..." : "") + '</div>';
      panel.appendChild(toggleDiv);

      var filledFields = qhTryAutoFill(fileObj);
      if (filledFields && filledFields.length > 0) {
        qhAddExtractLog(panel, "\uD83C\uDFAF", "Regex matched " + filledFields.length + " field(s): " + filledFields.join(", "), C.green);
      } else {
        qhAddExtractLog(panel, "\u26A0\uFE0F", "No fields matched -- fill in the form manually", C.amber);
      }
    } else if (fileObj.status === "uploaded") {
      var extractMsg = fileObj.name + " -- uploaded but extraction returned no data";
      if (fileObj.extractionError) {
        // Show the actual error from the server
        var errShort = fileObj.extractionError;
        if (errShort.indexOf('429') >= 0 || errShort.indexOf('rate') >= 0) {
          extractMsg = fileObj.name + " -- rate limited by Claude API (try uploading fewer files at once, or wait and retry)";
        } else if (errShort.indexOf('401') >= 0 || errShort.indexOf('authentication') >= 0) {
          extractMsg = fileObj.name + " -- API key invalid or expired (check ANTHROPIC_API_KEY in Script Properties)";
        } else if (errShort.indexOf('overloaded') >= 0 || errShort.indexOf('529') >= 0 || errShort.indexOf('500') >= 0) {
          extractMsg = fileObj.name + " -- Claude API temporarily overloaded (retry in a minute)";
        } else {
          extractMsg = fileObj.name + " -- extraction error: " + errShort;
        }
      } else if (fileObj.extractionMethod === "none") {
        extractMsg = fileObj.name + " -- could not extract text (check ANTHROPIC_API_KEY in Script Properties)";
      } else if (!fileObj.extractionMethod) {
        extractMsg = fileObj.name + " -- no extraction data returned (deploy latest Code.gs and redeploy web app)";
      }
      qhAddExtractLog(panel, "\u26A0\uFE0F", extractMsg, C.amber);
    }
  });

  // Re-render file list if files already exist (navigating back to Phase 0)
  if (qhState.files.length > 0) {
    qhRenderFileList("qh-file-list", "files");
  }

  grid.appendChild(leftCard);

  var rightCard = document.createElement("div");
  rightCard.className = "card";
  rightCard.innerHTML = '<div class="card-header"><span class="icon">\uD83D\uDC64</span><span>Client Information</span></div>';

  var banner = document.createElement("div");
  banner.id = "qh-extract-banner";
  banner.style.display = "none";
  rightCard.appendChild(banner);

  var formHtml = '<div class="qh-form-row">' +
    '<div class="qh-form-group"><label class="qh-form-label">First Name</label><input class="qh-form-input" id="qh-first" placeholder="First name"></div>' +
    '<div class="qh-form-group"><label class="qh-form-label">Last Name</label><input class="qh-form-input" id="qh-last" placeholder="Last name"></div></div>' +
    '<div class="qh-form-group"><label class="qh-form-label">Address</label><input class="qh-form-input" id="qh-addr" placeholder="Street address"></div>' +
    '<div class="qh-form-row">' +
    '<div class="qh-form-group"><label class="qh-form-label">City</label><input class="qh-form-input" id="qh-city" placeholder="City"></div>' +
    '<div class="qh-form-group"><label class="qh-form-label">State / Zip</label><input class="qh-form-input" id="qh-statezip" placeholder="TN 37075"></div></div>' +
    '<div class="qh-form-row">' +
    '<div class="qh-form-group"><label class="qh-form-label">Phone</label><input class="qh-form-input" id="qh-phone" placeholder="(615) 555-0000"></div>' +
    '<div class="qh-form-group"><label class="qh-form-label">Email</label><input class="qh-form-input" id="qh-email" placeholder="email@example.com"></div></div>' +
    '<div class="qh-form-group"><label class="qh-form-label">Lines of Business</label>' +
    '<div style="display:flex;gap:6px;flex-wrap:wrap;">' +
    '<label style="display:flex;align-items:center;gap:4px;padding:6px 12px;background:rgba(255,255,255,0.02);border:1px solid #2a2d3a;border-radius:8px;cursor:pointer;font-size:12px;color:#8b8fa3;"><input type="checkbox" id="qh-lob-auto"> Auto</label>' +
    '<label style="display:flex;align-items:center;gap:4px;padding:6px 12px;background:rgba(255,255,255,0.02);border:1px solid #2a2d3a;border-radius:8px;cursor:pointer;font-size:12px;color:#8b8fa3;"><input type="checkbox" id="qh-lob-home"> Home</label>' +
    '<label style="display:flex;align-items:center;gap:4px;padding:6px 12px;background:rgba(255,255,255,0.02);border:1px solid #2a2d3a;border-radius:8px;cursor:pointer;font-size:12px;color:#8b8fa3;"><input type="checkbox" id="qh-lob-boat"> Boat</label>' +
    '<label style="display:flex;align-items:center;gap:4px;padding:6px 12px;background:rgba(255,255,255,0.02);border:1px solid #2a2d3a;border-radius:8px;cursor:pointer;font-size:12px;color:#8b8fa3;"><input type="checkbox" id="qh-lob-umbrella"> Umbrella</label>' +
    '<label style="display:flex;align-items:center;gap:4px;padding:6px 12px;background:rgba(255,255,255,0.02);border:1px solid #2a2d3a;border-radius:8px;cursor:pointer;font-size:12px;color:#8b8fa3;"><input type="checkbox" id="qh-lob-comm"> Commercial</label>' +
    '</div></div>' +
    '<div class="qh-form-group"><label class="qh-form-label">Current Carrier</label><input class="qh-form-input" id="qh-carrier" placeholder="Current insurance carrier"></div>';

  var formDiv = document.createElement("div");
  formDiv.innerHTML = formHtml;
  rightCard.appendChild(formDiv);
  grid.appendChild(rightCard);
  container.appendChild(grid);

  // Re-populate form fields from qhState if navigating back to Phase 0
  var fd = qhState.formData;
  if (fd) {
    var fieldMap = { "qh-first": fd.first, "qh-last": fd.last, "qh-addr": fd.addr, "qh-city": fd.city, "qh-statezip": fd.statezip, "qh-phone": fd.phone, "qh-email": fd.email, "qh-carrier": fd.carrier };
    Object.keys(fieldMap).forEach(function(id) {
      var el = document.getElementById(id);
      if (el && fieldMap[id]) { el.value = fieldMap[id]; }
    });
    if (fd.lobs) {
      fd.lobs.forEach(function(lob) {
        var cb = document.getElementById("qh-lob-" + lob);
        if (cb) cb.checked = true;
      });
    }
  }

  var actionBar = document.createElement("div");
  actionBar.className = "qh-action-bar";
  actionBar.innerHTML = '<button class="qh-btn qh-btn-ghost" onclick="document.getElementById(\'qh-phase-area\').style.display=\'none\';">\u2190 Cancel</button>';
  var rightBtns = document.createElement("div");
  rightBtns.style.cssText = "display:flex;gap:8px;";
  var contBtn = document.createElement("button");
  contBtn.className = "qh-btn qh-btn-primary";
  contBtn.textContent = "Continue to Review \u2192";
  contBtn.onclick = function() {
    // Save form data to qhState BEFORE the DOM gets destroyed
    qhState.formData = {
      first: (document.getElementById("qh-first") || {}).value || "",
      last: (document.getElementById("qh-last") || {}).value || "",
      addr: (document.getElementById("qh-addr") || {}).value || "",
      city: (document.getElementById("qh-city") || {}).value || "",
      statezip: (document.getElementById("qh-statezip") || {}).value || "",
      phone: (document.getElementById("qh-phone") || {}).value || "",
      email: (document.getElementById("qh-email") || {}).value || "",
      carrier: (document.getElementById("qh-carrier") || {}).value || "",
      lobs: []
    };
    ["auto","home","boat","umbrella","comm"].forEach(function(lob) {
      var cb = document.getElementById("qh-lob-" + lob);
      if (cb && cb.checked) qhState.formData.lobs.push(lob);
    });
    qhState.phase = 1;
    renderQhPhases(container.parentNode);
  };
  rightBtns.appendChild(contBtn);
  actionBar.appendChild(rightBtns);
  container.appendChild(actionBar);
}

// ── PHASE 1: REVIEW & ROUTE ──
function renderQhPhase1(container) {
  var grid = document.createElement("div");
  grid.style.cssText = "display:grid;grid-template-columns:2fr 1fr;gap:18px;";

  var leftCard = document.createElement("div");
  leftCard.className = "card";

  // Confidence summary banner
  var fc = qhState.fieldConfidence || {};
  var confCounts = { high: 0, medium: 0, low: 0 };
  Object.keys(fc).forEach(function(k) { confCounts[fc[k].level] = (confCounts[fc[k].level] || 0) + 1; });
  var hasConfData = confCounts.high + confCounts.medium + confCounts.low > 0;

  if (hasConfData) {
    var confSummary = '<div class="qh-banner info" style="align-items:center;gap:12px;">' +
      '\uD83D\uDD0D Review extracted data below. ' +
      '<span style="display:inline-flex;gap:8px;margin-left:8px;">';
    if (confCounts.high > 0) confSummary += '<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:' + C.green + ';"><span style="width:8px;height:8px;border-radius:50%;background:' + C.green + ';"></span>' + confCounts.high + ' high</span>';
    if (confCounts.medium > 0) confSummary += '<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:' + C.amber + ';"><span style="width:8px;height:8px;border-radius:50%;background:' + C.amber + ';"></span>' + confCounts.medium + ' medium</span>';
    if (confCounts.low > 0) confSummary += '<span style="display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:' + C.red + ';"><span style="width:8px;height:8px;border-radius:50%;background:' + C.red + ';"></span>' + confCounts.low + ' low</span>';
    confSummary += '</span></div>';
    leftCard.innerHTML = confSummary;
  } else {
    leftCard.innerHTML = '<div class="qh-banner info">\uD83D\uDD0D Review extracted data below. Edit any fields that need correction.</div>';
  }

  var fd = qhState.formData || {};
  var fullName = ((fd.first || "") + " " + (fd.last || "")).trim();
  var fullAddr = [fd.addr, fd.city, fd.statezip].filter(function(s) { return s; }).join(", ");

  // Build confidence dot HTML helper
  function confDot(fieldKey) {
    var conf = fc[fieldKey];
    if (!conf) return "";
    var color = conf.level === "high" ? C.green : (conf.level === "medium" ? C.amber : C.red);
    return '<span title="Confidence: ' + conf.level + ' (' + conf.source + ')" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:' + color + ';margin-left:6px;vertical-align:middle;"></span>';
  }

  // Merge name confidence from first+last
  var nameConf = "";
  if (fc.first && fc.last) {
    var worst = (fc.first.level === "low" || fc.last.level === "low") ? "low" : ((fc.first.level === "medium" || fc.last.level === "medium") ? "medium" : "high");
    var nameColor = worst === "high" ? C.green : (worst === "medium" ? C.amber : C.red);
    nameConf = '<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:' + nameColor + ';margin-left:6px;vertical-align:middle;" title="Name confidence: ' + worst + '"></span>';
  } else if (fc.first) { nameConf = confDot("first"); }

  var addrConf = confDot("addr");

  var sections = [
    { title: "Client Information", color: C.blue, rows: [
      { l: "Name", v: fullName, conf: nameConf },
      { l: "Address", v: fullAddr, conf: addrConf },
      { l: "Phone", v: fd.phone || "", conf: confDot("phone") },
      { l: "Email", v: fd.email || "", conf: confDot("email") },
      { l: "Current Carrier", v: fd.carrier || "", conf: confDot("carrier") },
      { l: "Lines of Business", v: (fd.lobs && fd.lobs.length > 0) ? fd.lobs.map(function(l){ return l.charAt(0).toUpperCase()+l.slice(1); }).join(", ") : "", conf: "" }
    ]}
  ];

  sections.forEach(function(sec) {
    var secDiv = document.createElement("div");
    secDiv.style.marginBottom = "16px";
    secDiv.innerHTML = '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:' + sec.color + ';padding-bottom:6px;border-bottom:1px solid #2a2d3a;margin-bottom:8px;">' + sec.title + '</div>';
    sec.rows.forEach(function(r) {
      var row = document.createElement("div");
      row.style.cssText = "display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;";
      row.innerHTML = '<span style="color:#8b8fa3;">' + r.l + '</span><span style="color:' + C.t1 + ';font-weight:500;">' + (r.v || "--") + (r.conf || "") + '</span>';
      secDiv.appendChild(row);
    });
    leftCard.appendChild(secDiv);
  });

  // Show Named Insureds if extracted
  var ec = qhState.extractedCoverage;
  if (ec && ec.namedInsureds && ec.namedInsureds.length > 0) {
    var niDiv = document.createElement("div");
    niDiv.style.marginBottom = "16px";
    var niHtml = '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:' + C.teal + ';padding-bottom:6px;border-bottom:1px solid #2a2d3a;margin-bottom:8px;">Named Insureds / Household (' + ec.namedInsureds.length + ')</div>';
    ec.namedInsureds.forEach(function(ni, idx) {
      var niName = [ni.firstName, ni.middleName, ni.lastName].filter(function(s){return s;}).join(" ");
      if (!niName) return;
      niHtml += '<div style="padding:8px 10px;margin-bottom:6px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;">';
      niHtml += '<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:' + C.t1 + ';margin-bottom:4px;">';
      niHtml += '<span>' + niName + '</span>';
      if (ni.relation) niHtml += '<span style="font-size:10px;padding:2px 8px;background:rgba(79,140,255,0.12);color:' + C.blue + ';border-radius:10px;font-weight:600;">' + ni.relation + '</span>';
      niHtml += '</div>';
      var details = [];
      if (ni.dateOfBirth) details.push('DOB: ' + ni.dateOfBirth);
      if (ni.gender) details.push('Gender: ' + ni.gender);
      if (ni.maritalStatus) details.push(ni.maritalStatus);
      if (ni.licenseNumber) details.push('DL: ' + ni.licenseNumber + (ni.licenseState ? ' (' + ni.licenseState + ')' : ''));
      if (ni.occupation) details.push(ni.occupation);
      if (ni.phone) details.push(ni.phone);
      if (ni.email) details.push(ni.email);
      if (details.length > 0) niHtml += '<div style="font-size:11px;color:' + C.t3 + ';">' + details.join(' &bull; ') + '</div>';
      niHtml += '</div>';
    });
    niDiv.innerHTML = niHtml;
    leftCard.appendChild(niDiv);
  }

  // Show extracted coverage data if available
  if (ec && (ec.coverages || ec.vehicles || ec.drivers || ec.property)) {
    // Helper to safely display a value (handles objects, numbers, strings)
    function safeVal(v) {
      if (v === null || v === undefined) return "";
      if (typeof v === "object") return JSON.stringify(v);
      return String(v);
    }
    function covRow(label, val) {
      var v = safeVal(val);
      if (!v) return "";
      return '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.04);"><span style="color:#8b8fa3;">' + label + '</span><span style="color:' + C.t1 + ';font-weight:500;">' + v + '</span></div>';
    }

    // Coverages section
    if (ec.coverages) {
      var covDiv = document.createElement("div");
      covDiv.style.cssText = "margin-top:12px;";
      var covHtml = '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:' + C.green + ';padding-bottom:6px;border-bottom:1px solid #2a2d3a;margin-bottom:6px;">AI-Extracted Coverage Data</div>';
      if (ec.currentPremium) covHtml += covRow("Annual Premium", "$" + Number(ec.currentPremium).toLocaleString());
      if (ec.policyNumber) covHtml += covRow("Policy Number", ec.policyNumber);
      if (ec.effectiveDate) covHtml += covRow("Effective Date", ec.effectiveDate);
      if (ec.expirationDate) covHtml += covRow("Expiration Date", ec.expirationDate);
      var c = ec.coverages;
      // Auto coverages
      covHtml += covRow("Bodily Injury", c.bodilyInjury);
      covHtml += covRow("Property Damage", c.propertyDamage);
      covHtml += covRow("UM/UIM", c.umUim);
      covHtml += covRow("UM Property Damage", c.umPd);
      covHtml += covRow("Medical Payments", c.medicalPayments);
      covHtml += covRow("PIP", c.pip);
      covHtml += covRow("Comp Deductible", c.compDeductible || c.compDed);
      covHtml += covRow("Collision Deductible", c.collisionDeductible || c.collDed);
      covHtml += covRow("Rental", c.rental);
      covHtml += covRow("Towing/Roadside", c.towing);
      covHtml += covRow("GAP Coverage", c.gapCoverage);
      // Home coverages
      covHtml += covRow("Dwelling (Cov A)", c.dwelling);
      covHtml += covRow("Other Structures (Cov B)", c.otherStructures);
      covHtml += covRow("Personal Property (Cov C)", c.personalProperty);
      covHtml += covRow("Loss of Use (Cov D)", c.lossOfUse);
      covHtml += covRow("Liability (Cov E)", c.liability);
      covHtml += covRow("Med Pay (Cov F)", c.medPay);
      covHtml += covRow("Deductible", c.deductible);
      covHtml += covRow("Wind/Hail Ded", c.windHailDeductible);
      covHtml += covRow("Water Backup", c.waterBackup);
      covHtml += covRow("Umbrella", c.personalUmbrella);
      covDiv.innerHTML = covHtml;
      leftCard.appendChild(covDiv);
    }

    // Vehicles section
    if (ec.vehicles && ec.vehicles.length > 0) {
      var vehDiv = document.createElement("div");
      vehDiv.style.cssText = "margin-top:12px;";
      var vehHtml = '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:' + C.blue + ';padding-bottom:6px;border-bottom:1px solid #2a2d3a;margin-bottom:6px;">Vehicles</div>';
      ec.vehicles.forEach(function(v, i) {
        var vStr = [v.year, v.make, v.model].filter(function(s){return s;}).join(" ");
        if (vStr) vehHtml += covRow("Vehicle " + (i+1), vStr + (v.vin ? " (VIN: " + v.vin + ")" : ""));
      });
      vehDiv.innerHTML = vehHtml;
      leftCard.appendChild(vehDiv);
    }

    // Drivers section
    if (ec.drivers && ec.drivers.length > 0) {
      var drvDiv = document.createElement("div");
      drvDiv.style.cssText = "margin-top:12px;";
      var drvHtml = '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:' + C.purple + ';padding-bottom:6px;border-bottom:1px solid #2a2d3a;margin-bottom:6px;">Drivers</div>';
      ec.drivers.forEach(function(d, i) {
        var dName = [d.firstName, d.lastName].filter(function(s){return s;}).join(" ") || d.name || "";
        if (!dName) return;
        var dInfo = dName;
        var details = [];
        if (d.dateOfBirth) details.push("DOB: " + d.dateOfBirth);
        if (d.relation) details.push(d.relation);
        if (d.licenseNumber) details.push("DL: " + d.licenseNumber + (d.licenseState ? " (" + d.licenseState + ")" : ""));
        if (d.gender) details.push(d.gender);
        if (details.length > 0) dInfo += " — " + details.join(", ");
        drvHtml += covRow("Driver " + (i+1), dInfo);
      });
      drvDiv.innerHTML = drvHtml;
      leftCard.appendChild(drvDiv);
    }

    // Property section
    if (ec.property && (ec.property.yearBuilt || ec.property.squareFeet)) {
      var propDiv = document.createElement("div");
      propDiv.style.cssText = "margin-top:12px;";
      var propHtml = '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:' + C.amber + ';padding-bottom:6px;border-bottom:1px solid #2a2d3a;margin-bottom:6px;">Property Details</div>';
      propHtml += covRow("Year Built", ec.property.yearBuilt);
      propHtml += covRow("Square Feet", ec.property.squareFeet);
      propHtml += covRow("Stories", ec.property.stories);
      propHtml += covRow("Roof Type", ec.property.roofType);
      propHtml += covRow("Roof Year", ec.property.roofYear);
      propHtml += covRow("Construction", ec.property.constructionType);
      propHtml += covRow("Foundation", ec.property.foundationType);
      propHtml += covRow("Heating", ec.property.heatingType);
      propHtml += covRow("Pool", ec.property.pool);
      propHtml += covRow("Dogs", ec.property.dogs);
      propDiv.innerHTML = propHtml;
      leftCard.appendChild(propDiv);
    }
  } else {
    var coverageBox = document.createElement("div");
    coverageBox.style.cssText = "padding:14px;background:rgba(255,255,255,0.02);border:1px solid #2a2d3a;border-radius:10px;margin-top:12px;";
    coverageBox.innerHTML = '<div style="font-size:11px;font-weight:600;color:' + C.t2 + ';margin-bottom:6px;">No coverage data extracted yet.</div>' +
      '<div style="font-size:11px;color:' + C.t3 + ';">Go back to Upload & Extract and upload dec pages, or Christine can enter data manually.</div>';
    leftCard.appendChild(coverageBox);
  }
  grid.appendChild(leftCard);

  var rightCard = document.createElement("div");
  rightCard.className = "card";
  rightCard.innerHTML = '<div class="card-header"><span class="icon">\uD83D\uDCE1</span><span>Carrier Routing</span></div>' +
    '<p style="font-size:11px;color:' + C.t3 + ';margin-bottom:12px;">API carriers fire automatically. Manual carriers generate a pre-filled email to Christine.</p>';

  var carriers = [
    { name: "Erie Insurance", method: "Christine enters into Erie portal", badge: "manual", logo: "ERIE", bg: "#581c87", fg: "#d8b4fe" },
    { name: "Travelers", method: "Auto-quote via API", badge: "api", logo: "TRV", bg: "#7f1d1d", fg: "#fca5a5" },
    { name: "Progressive", method: "Auto-quote via API", badge: "api", logo: "PRG", bg: "#1e3a5f", fg: "#93c5fd" }
  ];

  carriers.forEach(function(c) {
    var chip = document.createElement("div");
    chip.className = "qh-carrier-chip";
    chip.innerHTML = '<div class="qh-carrier-logo" style="background:' + c.bg + ';color:' + c.fg + ';">' + c.logo + '</div>' +
      '<div class="qh-carrier-info"><div class="qh-carrier-name">' + c.name + '</div><div class="qh-carrier-method">' + c.method + '</div></div>' +
      '<div class="qh-carrier-badge ' + c.badge + '">' + c.badge.toUpperCase() + '</div>';
    rightCard.appendChild(chip);
  });

  var nextSteps = document.createElement("div");
  nextSteps.style.cssText = "background:rgba(255,255,255,0.02);border:1px solid #2a2d3a;border-radius:10px;padding:14px;margin-top:14px;";
  nextSteps.innerHTML = '<div style="font-size:11px;font-weight:600;color:' + C.amber + ';margin-bottom:6px;">What happens next:</div>' +
    '<div style="font-size:11px;color:' + C.t3 + ';line-height:1.6;">1. Pre-filled quote email to Christine<br>2. Travelers API quote fires<br>3. Progressive API quote fires<br>4. Christine quotes Erie in portal<br>5. All quotes land in comparison</div>';
  rightCard.appendChild(nextSteps);
  grid.appendChild(rightCard);
  container.appendChild(grid);

  var actionBar = document.createElement("div");
  actionBar.className = "qh-action-bar";
  var backBtn = document.createElement("button");
  backBtn.className = "qh-btn qh-btn-ghost";
  backBtn.textContent = "\u2190 Back";
  backBtn.onclick = function() { qhState.phase = 0; renderQhPhases(container.parentNode); };
  actionBar.appendChild(backBtn);
  var rightBtns = document.createElement("div");
  rightBtns.style.cssText = "display:flex;gap:8px;";
  var routeBtn = document.createElement("button");
  routeBtn.className = "qh-btn qh-btn-success qh-btn-lg";
  routeBtn.textContent = "\u26A1 Route & Quote \u2192";
  routeBtn.onclick = function() {
    routeBtn.textContent = "\u23F3 Routing...";
    routeBtn.disabled = true;

    // Read from qhState.formData (saved when user clicked Continue from Phase 0)
    var fd = qhState.formData || {};
    var clientName = ((fd.first || "") + " " + (fd.last || "")).trim() || "New Client";
    var fullAddr = [fd.addr, fd.city, fd.statezip].filter(function(s) { return s; }).join(", ");
    var lobsList = (fd.lobs && fd.lobs.length > 0) ? fd.lobs.map(function(l){ return l.charAt(0).toUpperCase()+l.slice(1); }).join(", ") : "Auto, Home";
    var carriersList = "Erie, Travelers, Progressive";

    // Build a status area to show routing progress
    var statusArea = document.getElementById("qh-route-status");
    if (!statusArea) {
      statusArea = document.createElement("div");
      statusArea.id = "qh-route-status";
      statusArea.style.cssText = "margin-top:14px;padding:14px;background:rgba(255,255,255,0.02);border:1px solid #2a2d3a;border-radius:10px;";
      container.insertBefore(statusArea, container.querySelector(".qh-action-bar"));
    }
    statusArea.innerHTML = '<div style="font-size:11px;font-weight:600;color:' + C.t1 + ';margin-bottom:8px;">Routing in progress...</div>';

    function addStatus(icon, text, color) {
      var line = document.createElement("div");
      line.style.cssText = "display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px;color:" + (color || C.t2) + ";";
      line.innerHTML = '<span>' + icon + '</span><span>' + text + '</span>';
      statusArea.appendChild(line);
    }

    // ── Step 1: Create lead in AgencyZoom ──
    addStatus("\u23F3", "Creating lead in AgencyZoom...", C.amber);
    var azPayload = {
      firstName: fd.first || "",
      lastName: fd.last || "",
      address: fd.addr || "",
      city: fd.city || "",
      statezip: fd.statezip || "",
      phone: fd.phone || "",
      email: fd.email || "",
      currentCarrier: fd.carrier || "",
      lobs: lobsList,
      notes: "Routed from Quoting Hub. Carriers: " + carriersList
    };

    // Track results for accurate final status
    var routeResults = { azOk: false, emailOk: false };

    fetchGS("actionCreateAZLead", function(azResult) {
      var azId = "";
      if (azResult && azResult.ok && azResult.data) {
        azId = azResult.data.customerId || "";
        routeResults.azOk = true;
        addStatus("\u2705", "Lead created in AgencyZoom" + (azId ? " (ID: " + azId + ")" : ""), C.green);
      } else {
        var azErr = (azResult && azResult.error) ? azResult.error : "Unknown error";
        var diagStr = "";
        if (azResult && azResult.diagnostics && azResult.diagnostics.length) {
          diagStr = " [" + azResult.diagnostics.join(" → ") + "]";
        }
        addStatus("\u26A0\uFE0F", "AgencyZoom: " + azErr + diagStr + " -- add lead manually", C.amber);
        console.log("AZ diagnostics:", azResult);
      }

      // Store the quote in qhState for Phase 2
      qhState.currentQuote = {
        id: azId || ("qh_" + Date.now()),
        name: clientName,
        address: fullAddr,
        lobs: lobsList,
        carriers: carriersList,
        status: "Awaiting Quotes",
        bestPremium: 0,
        currentPremium: 0,
        savings: 0,
        azCustomerId: azId
      };

      // ── Step 2: Email Christine + Log to Tracker (single call) ──
      // actionSubmitQuote handles BOTH the detailed Pre-Filled email AND tracker logging
      addStatus("\u23F3", "Sending pre-filled quote to Christine & logging...", C.amber);
      var submitPayload = {
        firstName: fd.first || "",
        lastName: fd.last || "",
        clientName: clientName,
        address: fullAddr,
        lineOfBusiness: lobsList,
        lobs: lobsList,
        carrier: carriersList,
        carriers: carriersList,
        source: (qhState.files && qhState.files.length > 0) ? "Dec Page Upload" : "Manual Entry",
        email: fd.email || "",
        phone: fd.phone || "",
        currentCarrier: fd.carrier || "",
        azCustomerId: azId,
        uploadedFiles: qhState.files.filter(function(f) { return f.driveUrl; }).map(function(f) {
          return { name: f.name, url: f.driveUrl };
        }),
        extractedCoverage: qhState.extractedCoverage || null,
        notes: "Routed from Command Center Quoting Hub" + (azId ? " | AZ ID: " + azId : "")
      };

      fetchGS("actionSubmitQuote", function(sqResult) {
        if (sqResult && sqResult.ok) {
          routeResults.emailOk = true;
          addStatus("\u2705", "Pre-filled quote emailed to Christine", C.green);
          addStatus("\u2705", "Logged to Quote Tracker", C.green);
        } else {
          addStatus("\u26A0\uFE0F", "Submit failed: " + ((sqResult && sqResult.error) || "unknown error"), C.amber);
        }

        // Also save to QUOTES sheet as backup
        fetchGS("actionSaveQuote", function() {}, function() {}, {
          name: clientName,
          address: fullAddr,
          lobs: lobsList,
          carriers: carriersList,
          status: "Awaiting Quotes",
          phone: fd.phone || "",
          email: fd.email || "",
          currentCarrier: fd.carrier || ""
        });

        // Step 3: API carriers status
        addStatus("\u23F8\uFE0F", "Travelers API -- pending API access (coming soon)", C.t3);
        addStatus("\u23F8\uFE0F", "Progressive API -- pending API access (coming soon)", C.t3);

        // Done -- build an accurate summary based on actual results
        var summaryParts = [];
        if (routeResults.azOk) summaryParts.push("Lead added to AgencyZoom");
        else summaryParts.push("AgencyZoom failed (add manually)");
        if (routeResults.emailOk) summaryParts.push("Christine notified");
        else summaryParts.push("Email to Christine failed (send manually)");

        var allOk = routeResults.azOk && routeResults.emailOk;
        var doneDiv = document.createElement("div");
        doneDiv.style.cssText = "margin-top:10px;padding:10px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;" +
          (allOk

        doneDiv.innerHTML = '<span style="font-size:12px;font-weight:600;color:' + (allOk ? C.green : C.amber) + ';">' +
          (allOk ? "\u2705 " : "\u26A0\uFE0F ") + summaryParts.join(" | ") + '</span>';
        var goBtn = document.createElement("button");
        goBtn.className = "qh-btn qh-btn-primary";
        goBtn.textContent = "Go to Quote Comparison \u2192";
        goBtn.onclick = function() {
          qhState.phase = 2;
          renderQhPhases(container.parentNode);
        };
        doneDiv.appendChild(goBtn);
        statusArea.appendChild(doneDiv);

        routeBtn.textContent = allOk ? "\u2705 Routed" : "\u26A0\uFE0F Partial";
        routeBtn.disabled = !allOk; // Allow retry if something failed
      }, function(err) {
        addStatus("\u274C", "Submit failed: " + (err && err.message || "unknown error -- check Apps Script execution log"), C.red);
        addStatus("\u23F8\uFE0F", "Travelers API -- pending API access", C.t3);

// ─── NAVIGATE FUNCTION ───────────────────────────────
function navigateTo(view) {
  appState.view = view;
  if (view === "newBiz" || view === "newbiz") {
    renderNewBizView();
  } else if (view === "renewals") {
    renderRenewalView();
  } else if (view === "bob") {
    renderBobView();
  } else if (view === "boundbiz") {
    renderBoundBizView();
  } else if (view === "cancellations") {
    renderCancellationsView();
  } else if (view === "quotinghub") {
    renderQuotingHubView();
  } else {
    renderMainView();
  }
}

// ─── FETCH DATA ──────────────────────────────────────
function reRenderCurrentView() {
  if (appState.view === "main") { renderMainView(); }
  else if (appState.view === "newBiz" || appState.view === "newbiz") { renderNewBizView(); }
  else if (appState.view === "renewals") { renderRenewalView(); }
  else if (appState.view === "bob") { renderBobView(); }
  else if (appState.view === "boundbiz") { renderBoundBizView(); }
  else if (appState.view === "cancellations") { renderCancellationsView(); }
  else if (appState.view === "quotinghub") { renderQuotingHubView(); }
  else { renderMainView(); }
}

// Auto-refresh strategy:
//   ALL auto-refreshes are SILENT — data updates in memory, DOM is never touched.
//   This prevents form resets (Quoting Hub, etc.) and unexpected visual changes.
//   The DOM only updates when the user:
//     (1) Clicks the manual refresh button, or
//     (2) Navigates to a different view (which always renders fresh data).

function fetchData(isAutoRefresh) {
  appState.loading = true;

  // Save scroll position so manual refresh doesn't jump to top
  var savedScrollY = window.scrollY || window.pageYOffset || 0;
  var savedView = appState.view;

  // Auto-refresh ALWAYS skips DOM rebuild — only manual refresh re-renders
  var skipRender = !!isAutoRefresh;

  var btn = document.getElementById("refresh-btn");
  if (btn && !skipRender) {
    btn.classList.add("loading");
    btn.innerHTML = '\u26A1 FETCHING...';
  }

  fetchGS("actionDashboardSnapshot", function(r) {
    if (r && r.ok && r.data) {
      // Merge new data but PRESERVE separately-loaded data (like cancellations)
      var preserved = appState.data.cancellations;
      appState.data = r.data;
      if (preserved && !appState.data.cancellations) {
        appState.data.cancellations = preserved;
      }
    }
    appState.loading = false;
    appState.lastRefresh = new Date();
    document.getElementById("init-loader").classList.add("done");

    // Stay on whatever view the user is on
    appState.view = savedView;

    if (skipRender) {
      // Data updated silently — don't touch the DOM
      // Just update the refresh button/timestamp if visible
      var b = document.getElementById("refresh-btn");
      if (b) { b.classList.remove("loading"); b.innerHTML = '\u26A1 LIVE'; }
      // Update the "Last refresh" timestamp text if it exists
      var ts = document.getElementById("refresh-timestamp");
      if (ts) { ts.textContent = "Data: " + new Date().toLocaleTimeString(); }
      console.log("[AUTO-REFRESH] Data updated silently (view: " + savedView + ") — DOM untouched");
    } else {
      reRenderCurrentView();
    }
  }, function() {
    appState.loading = false;
    appState.lastRefresh = new Date();
    document.getElementById("init-loader").classList.add("done");

    appState.view = savedView;

    if (!skipRender) {
      reRenderCurrentView();
    } else {
      var b = document.getElementById("refresh-btn");
      if (b) { b.classList.remove("loading"); b.innerHTML = '\u26A1 LIVE'; }
    }
  });
}

// ─── FETCH CANCELLATIONS (separate call, won't block main dashboard) ──
try {
  fetchGS("actionReadCancellations", function(r) {
    console.log("[CANC-INIT] actionReadCancellations response:", JSON.stringify(r).substring(0, 300));
    // Handle BOTH formats: respond_() wrapper OR raw data
    var payload = null;
    if (r && r.ok && r.data) { payload = r.data; }
    else if (r && (r.summary || r.rows)) { payload = r; }
    else if (r && r.ok) { payload = r; }
    if (payload) {
      appState.data.cancellations = payload;
      console.log("[CANC-INIT] Cancellations loaded. Policies:", (payload.summary && payload.summary.totalPolicies) || "?");
      if (appState.view === "main" && !PROTECTED_VIEWS[appState.view]) renderMainView();
    } else {
      console.warn("[CANC-INIT] Unexpected format or empty response:", r);
    }
  }, function(err) {
    console.warn("[CANC-INIT] Background fetch failed:", err && err.message || err);
  });
} catch(e) { console.warn("[CANC-INIT] Exception:", e); }

// ─── INIT APP ────────────────────────────────────────
// Close RingCentral call menus when clicking outside
window.addEventListener('click', function(e) {
  if (!e.target.closest('.rc-call-wrap')) {
    var menus = document.querySelectorAll('.rc-call-menu');
    menus.forEach(function(m) { m.style.display = 'none'; });
  }
});

window.addEventListener("DOMContentLoaded", function() {
  // Register service worker for PWA / offline support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(function(reg) {
      console.log('[SW] Registered:', reg.scope);
    }).catch(function(err) {
      console.warn('[SW] Registration failed:', err);
    });
  }

  renderMainView();
  fetchData(false);
  setInterval(function() { fetchData(true); }, 300000);
});
</script>
