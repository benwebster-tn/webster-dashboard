<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body, #root { min-height: 100vh; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #0f1117; color: #f0f0f5; }

/* ═══ CSS Variables for NB Workflow Engine ═══ */
:root {
  --bg: #0f1117; --card: #1a1d27; --card-hover: #1f2330; --border: #2a2d3a;
  --text: #f0f0f5; --text-dim: #8b8fa3; --text-muted: #5c6078;
  --blue: #4f8cff; --green: #34d399; --purple: #a78bfa; --teal: #2dd4bf;
  --amber: #fbbf24; --red: #f87171; --orange: #fb923c;
  --blue-bg: rgba(79,140,255,0.12); --green-bg: rgba(52,211,153,0.12);
  --purple-bg: rgba(167,139,250,0.12); --amber-bg: rgba(251,191,36,0.12);
  --red-bg: rgba(248,113,113,0.12); --teal-bg: rgba(45,212,191,0.12);
}

#init-loader { position: fixed; inset: 0; background: #0f1117; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
#init-loader.done { opacity: 0; pointer-events: none; }
.spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #4f8cff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.load-text { color: #8b8fa3; font-size: 13px; margin-top: 14px; }

@keyframes pulse { 0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52,211,153,0.5); } 50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(52,211,153,0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.card { position: relative; background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 16px; padding: 24px; overflow: hidden; transition: all 0.3s; animation: fadeUp 0.6s ease both; cursor: default; }
.card:hover { background: #1f2330; transform: translateY(-2px); }
.card.clickable:hover { border-color: #4f8cff; cursor: pointer; }
.card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 16px 16px 0 0; }
.card-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #8b8fa3; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.card-header .icon { font-size: 16px; }
.card-header .expand-hint { margin-left: auto; font-size: 10px; color: #4f8cff; background: rgba(79,140,255,0.12); padding: 2px 8px; border-radius: 8px; }

.progress-bar-container { margin-top: 12px; }
.progress-bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; color: #8b8fa3; }
.progress-bar-label .pct { font-weight: 600; }
.progress-bar-track { width: 100%; height: 10px; background: rgba(255,255,255,0.06); border-radius: 8px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 8px; transition: width 1.5s cubic-bezier(0.22,1,0.36,1); }

.badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 12px; margin-top: 10px; }
.badge.ahead { background: rgba(52,211,153,0.12); color: #34d399; }
.badge.behind { background: rgba(248,113,113,0.12); color: #f87171; }

.back-btn { display: flex; align-items: center; gap: 6px; background: rgba(79,140,255,0.1); border: 1px solid rgba(79,140,255,0.3); color: #4f8cff; padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 20px; transition: all 0.2s; }
.back-btn:hover { background: rgba(79,140,255,0.2); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
.grid-2x1 { display: grid; grid-template-columns: 2fr 1fr; gap: 18px; }
.grid-1x1 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

.anim-number { font-weight: 800; letter-spacing: -1px; }
.subtitle { font-size: 13px; color: #8b8fa3; margin-top: 6px; }

.gauge { display: flex; flex-direction: column; align-items: center; }
.gauge-svg { width: 100%; height: auto; }
.gauge-value { font-size: 28px; font-weight: 800; margin-top: -8px; }
.gauge-label { font-size: 12px; color: #5c6078; }

.health-ring { position: relative; width: 100px; height: 100px; }
.health-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.health-ring-value { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; }

.monthly-chart { display: flex; align-items: flex-end; gap: 6px; height: 170px; padding-top: 10px; }
.monthly-chart-bar { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
.monthly-chart-col { display: flex; gap: 3px; align-items: flex-end; flex: 1; width: 100%; justify-content: center; }
.chart-bar { width: 12px; min-height: 2px; border-radius: 4px 4px 0 0; transition: height 1s cubic-bezier(0.22,1,0.36,1); }
.chart-label { font-size: 10px; letter-spacing: 0.5px; color: #5c6078; }
.chart-label.current { font-weight: 800; color: #4f8cff; }
.chart-legend { display: flex; gap: 16px; justify-content: center; margin-top: 12px; }
.chart-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #8b8fa3; }
.chart-legend-dot { width: 8px; height: 8px; border-radius: 3px; }

.main-grid { margin-bottom: 18px; }
.main-view { animation: slideIn 0.4s ease both; }

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; padding: 24px 24px 20px 24px; border-bottom: 1px solid #2a2d3a; }
.header-left h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg,#fff 0%,#a0a8c0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
.header-left p { color: #8b8fa3; font-size: 13px; margin-top: 4px; }
.header-left .timestamp { color: #5c6078; font-size: 11px; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.refresh-btn { display: flex; align-items: center; gap: 6px; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); padding: 6px 14px; border-radius: 20px; font-size: 12px; color: #34d399; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.refresh-btn.loading { color: #fbbf24; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; }
.status-dot.active { background: #34d399; animation: pulse 2s ease-in-out infinite; }
.date-display { color: #8b8fa3; font-size: 13px; font-weight: 500; }

.footer { text-align: center; margin-top: 24px; padding: 16px 24px 24px 24px; border-top: 1px solid #2a2d3a; font-size: 11px; color: #5c6078; }

.summary-box { text-align: center; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 10px; border: 1px solid rgba(255,255,255,0.04); }
.summary-box-value { font-size: 22px; font-weight: 800; }
.summary-box-label { font-size: 9px; color: #5c6078; text-transform: uppercase; }

.small-stat { text-align: center; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 10px; }
.small-stat-value { font-size: 18px; font-weight: 800; }
.small-stat-label { font-size: 9px; color: #5c6078; text-transform: uppercase; letter-spacing: 0.8px; }

.quarter-box { text-align: center; padding: 14px; border-radius: 12px; }
.quarter-box-label { font-size: 10px; color: #5c6078; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.quarter-box-value { font-size: 24px; font-weight: 800; }
.quarter-box-subtitle { font-size: 11px; color: #8b8fa3; margin-top: 4px; }

/* ── CANCEL MODAL ──────────────────────────────────────── */
.modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease; }
.modal-box { background:#1a1d27;border:1px solid #2a2d3a;border-radius:16px;padding:28px;width:480px;max-width:92vw;animation:fadeUp 0.3s ease both; }
.modal-title { font-size:18px;font-weight:800;color:#f87171;margin-bottom:16px;display:flex;align-items:center;gap:10px; }
.modal-field { margin-bottom:14px; }
.modal-field-label { font-size:10px;color:#8b8fa3;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;font-weight:700; }
.modal-field-value { font-size:14px;color:#f0f0f5;font-weight:600; }
.modal-select { width:100%;background:#12141c;border:1px solid #2a2d3a;border-radius:10px;padding:10px 14px;color:#f0f0f5;font-size:14px;font-family:Inter,sans-serif;outline:none;cursor:pointer;appearance:none;-webkit-appearance:none; }
.modal-select:focus { border-color:#f87171; }
.modal-btns { display:flex;gap:12px;margin-top:20px; }
.modal-btn { flex:1;padding:11px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;transition:all 0.2s;border:none; }
.modal-btn.confirm { background:linear-gradient(135deg,#f87171,#ef4444);color:#fff; }
.modal-btn.confirm:hover { opacity:0.85; }
.modal-btn.confirm:disabled { opacity:0.4;cursor:not-allowed; }
.modal-btn.cancel-modal-btn { background:rgba(255,255,255,0.06);color:#8b8fa3;border:1px solid #2a2d3a; }
.modal-btn.cancel-modal-btn:hover { background:rgba(255,255,255,0.1); }
.cancel-policy-btn { display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:#f87171;font-family:Inter,sans-serif;transition:all 0.2s;white-space:nowrap; }
.cancel-policy-btn:hover { background:rgba(248,113,113,0.2);border-color:rgba(248,113,113,0.4); }

/* ── ADD CUSTOMER MODAL ──────────────────────────────── */
.modal-input { width:100%;background:#12141c;border:1px solid #2a2d3a;border-radius:10px;padding:10px 14px;color:#f0f0f5;font-size:14px;font-family:Inter,sans-serif;outline:none;transition:border-color 0.2s; }
.modal-input:focus { border-color:#4f8cff; }
.modal-input::placeholder { color:#5c6078; }
.modal-btn.confirm-add { background:linear-gradient(135deg,#34d399,#2dd4bf);color:#fff; }
.modal-btn.confirm-add:hover { opacity:0.85; }
.modal-btn.confirm-add:disabled { opacity:0.4;cursor:not-allowed; }
.add-customer-btn { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#34d399,#2dd4bf);border:none;color:#fff;font-family:Inter,sans-serif;transition:all 0.2s;white-space:nowrap; }
.add-customer-btn:hover { opacity:0.85;transform:translateY(-1px); }

/* ── QUOTING HUB STYLES ──────────────────────────────── */
.qh-stepper { display:flex;align-items:center;gap:0;margin-bottom:24px;background:#1a1d27;border:1px solid #2a2d3a;border-radius:14px;padding:14px 20px; }
.qh-step { display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 12px;border-radius:8px;transition:background 0.2s;flex:1; }
.qh-step:hover { background:rgba(255,255,255,0.04); }
.qh-step-num { width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid #2a2d3a;color:#5c6078;transition:all 0.3s;flex-shrink:0; }
.qh-step.active .qh-step-num { background:#4f8cff;border-color:#4f8cff;color:#fff;box-shadow:0 0 12px rgba(79,140,255,0.4); }
.qh-step.done .qh-step-num { background:#059669;border-color:#059669;color:#fff; }
.qh-step-text { font-size:12px;color:#5c6078;transition:color 0.2s; }
.qh-step.active .qh-step-text { color:#f0f0f5;font-weight:600; }
.qh-step.done .qh-step-text { color:#34d399; }
.qh-step-conn { width:32px;height:2px;background:#2a2d3a;flex-shrink:0; }
.qh-step-conn.done { background:#059669; }

.qh-upload-zone { border:2px dashed #2a2d3a;border-radius:12px;padding:36px;text-align:center;transition:all 0.3s;cursor:pointer;position:relative; }
.qh-upload-zone:hover { border-color:#4f8cff;background:rgba(79,140,255,0.04); }
.qh-upload-zone.drag-active { border-color:#4f8cff;background:rgba(79,140,255,0.08);box-shadow:0 0 20px rgba(79,140,255,0.15); }
.qh-upload-zone.drag-active .qh-upload-icon { transform:scale(1.15); }
.qh-upload-icon { font-size:32px;margin-bottom:6px;transition:transform 0.2s; }
.qh-upload-text { font-size:13px;color:#8b8fa3; }
.qh-upload-sub { font-size:11px;color:#5c6078;margin-top:2px; }
.qh-upload-or { font-size:11px;color:#5c6078;margin:10px 0 6px; }
.qh-upload-browse { display:inline-flex;align-items:center;gap:5px;padding:7px 16px;background:rgba(79,140,255,0.1);border:1px solid rgba(79,140,255,0.3);border-radius:8px;color:#4f8cff;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:Inter,sans-serif; }
.qh-upload-browse:hover { background:rgba(79,140,255,0.18);border-color:#4f8cff; }
.qh-file-remove { background:none;border:none;color:#5c6078;cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;transition:color 0.2s; }
.qh-file-remove:hover { color:#f87171; }

.qh-file { display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.02);border:1px solid #2a2d3a;border-radius:8px;margin-bottom:6px; }
.qh-file-icon { font-size:16px; }
.qh-file-info { flex:1; }
.qh-file-name { font-size:12px;color:#f0f0f5;font-weight:500; }
.qh-file-meta { font-size:10px;color:#5c6078; }
.qh-file-badge { font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px; }
.qh-file-badge.ok { background:rgba(52,211,153,0.12);color:#34d399; }
.qh-file-badge.proc { background:rgba(79,140,255,0.12);color:#4f8cff; }

.qh-form-group { margin-bottom:12px; }
.qh-form-label { display:block;font-size:10px;font-weight:700;color:#8b8fa3;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.6px; }
.qh-form-input { width:100%;padding:9px 12px;background:#12141c;border:1px solid #2a2d3a;border-radius:8px;color:#f0f0f5;font-size:13px;font-family:Inter,sans-serif;outline:none;box-sizing:border-box;transition:border-color 0.2s; }
.qh-form-input:focus { border-color:#4f8cff; }
.qh-form-input.prefilled { border-color:#059669;background:rgba(5,150,105,0.06); }
.qh-form-row { display:grid;grid-template-columns:1fr 1fr;gap:10px; }

.qh-banner { display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:12px;font-weight:500; }
.qh-banner.success { background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:#34d399; }
.qh-banner.info { background:rgba(79,140,255,0.08);border:1px solid rgba(79,140,255,0.25);color:#93c5fd; }

.qh-carrier-chip { display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.02);border:1px solid #2a2d3a;border-radius:10px;margin-bottom:6px; }
.qh-carrier-logo { width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700; }
.qh-carrier-info { flex:1; }
.qh-carrier-name { font-size:12px;font-weight:600;color:#f0f0f5; }
.qh-carrier-method { font-size:10px;color:#5c6078; }
.qh-carrier-badge { font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px; }
.qh-carrier-badge.api { background:rgba(52,211,153,0.12);color:#34d399; }
.qh-carrier-badge.manual { background:rgba(251,191,36,0.12);color:#fbbf24; }

.qh-comp-table { width:100%;border-collapse:collapse; }

/* NB WORKFLOW ENGINE — PROTOTYPE STYLES                                      */
/* ═══════════════════════════════════════════════════════════════════════════ */
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); max-height: 0; } to { opacity: 1; transform: translateY(0); max-height: 1000px; } }
@keyframes shimmer { 0% { background-position: -200px 0; } 100% { background-position: 200px 0; } }

.nav-tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 4px; }
.nav-tab { padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--text-dim); cursor: pointer; transition: all 0.2s; border: none; background: none; font-family: inherit; }
.nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.nav-tab.active { color: #fff; background: var(--blue); }
.nav-tab .count { font-size: 11px; background: rgba(255,255,255,0.15); padding: 1px 7px; border-radius: 10px; margin-left: 6px; }
.nav-tab.active .count { background: rgba(255,255,255,0.25); }

.grid-sidebar { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }

.queue-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.2s; margin-bottom: 8px; }
.queue-item:hover { background: rgba(79,140,255,0.06); border-color: rgba(79,140,255,0.3); transform: translateX(4px); }
.queue-item.active { background: rgba(79,140,255,0.1); border-color: var(--blue); }
.queue-item.urgent { border-left: 3px solid var(--red); }
.queue-item.warning { border-left: 3px solid var(--amber); }
.queue-item.normal { border-left: 3px solid var(--green); }
.queue-avatar { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
.queue-info { flex: 1; min-width: 0; }
.queue-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.queue-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; display: flex; gap: 8px; align-items: center; }
.queue-stage { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }

.detail-panel { animation: slideIn 0.3s ease both; }
.detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.detail-name { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.detail-stage-badge { font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 10px; }
.detail-meta { display: flex; gap: 20px; margin-top: 8px; }
.detail-meta-item { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 4px; }
.detail-section { margin-top: 24px; }
.detail-section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

.action-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
.action-btn { padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--text); transition: all 0.2s; display: flex; align-items: center; gap: 6px; font-family: inherit; }
.action-btn:hover { transform: translateY(-1px); }
.action-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.action-btn.primary:hover { background: #3b7bf7; }
.action-btn.success { background: var(--green-bg); border-color: rgba(52,211,153,0.3); color: var(--green); }
.action-btn.danger { background: var(--red-bg); border-color: rgba(248,113,113,0.3); color: var(--red); }

.carrier-row { display: grid; grid-template-columns: 140px 100px 100px 120px 1fr 80px; gap: 12px; align-items: center; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
.carrier-row:last-child { border-bottom: none; }
.carrier-row.header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.carrier-name { font-weight: 600; }
.carrier-status { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 8px; display: inline-block; }
.status-quoted { background: var(--green-bg); color: var(--green); }
.status-pending { background: var(--amber-bg); color: var(--amber); }
.status-not-started { background: rgba(255,255,255,0.05); color: var(--text-muted); }
.status-declined { background: var(--red-bg); color: var(--red); }
.status-selected { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(79,140,255,0.3); }

.comparison-table { width: 100%; border-collapse: separate; border-spacing: 0; }
.comparison-table th { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); padding: 12px 16px; text-align: left; border-bottom: 2px solid var(--border); position: sticky; top: 0; background: var(--card); }
.comparison-table td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.comparison-table tr:hover td { background: rgba(255,255,255,0.02); }
.comparison-carrier-header { font-size: 14px; font-weight: 700; text-align: center !important; padding: 16px !important; }
.comparison-carrier-header .premium { font-size: 22px; font-weight: 800; display: block; margin-top: 4px; }
.comparison-carrier-header .savings { font-size: 11px; font-weight: 600; margin-top: 4px; display: inline-block; padding: 2px 8px; border-radius: 8px; }
.best-value { background: rgba(52,211,153,0.08); }
.best-value td { border-color: rgba(52,211,153,0.15); }
.comparison-label { font-weight: 500; color: var(--text-dim); }
.comparison-value { font-weight: 600; }
.comparison-winner { position: relative; }
.comparison-winner::after { content: '\2605'; position: absolute; top: -2px; right: 4px; font-size: 10px; color: var(--green); }

.comp-builder { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-top: 16px; }
.comp-builder input, .comp-builder select { background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; font-family: inherit; width: 100%; }
.comp-builder input:focus, .comp-builder select:focus { outline: none; border-color: var(--blue); }
.comp-builder label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 4px; }
.comp-field { margin-bottom: 12px; }
.comp-carrier-col { flex: 1; min-width: 200px; padding: 16px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 12px; }
.comp-carrier-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.add-carrier-btn { padding: 12px; border: 2px dashed rgba(79,140,255,0.3); border-radius: 12px; color: var(--blue); font-weight: 600; cursor: pointer; background: none; width: 100%; font-size: 13px; font-family: inherit; transition: all 0.2s; min-width: 200px; }
.add-carrier-btn:hover { background: var(--blue-bg); border-color: var(--blue); }

.timeline { position: relative; padding-left: 28px; }
.timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: var(--border); }
.timeline-item { position: relative; padding-bottom: 20px; animation: fadeUp 0.4s ease both; }
.timeline-dot { position: absolute; left: -23px; top: 4px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg); }
.timeline-dot.blue { border-color: var(--blue); background: var(--blue); }
.timeline-dot.green { border-color: var(--green); background: var(--green); }
.timeline-dot.amber { border-color: var(--amber); background: var(--amber); }
.timeline-dot.red { border-color: var(--red); background: var(--red); }
.timeline-date { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
.timeline-text { font-size: 13px; color: var(--text-dim); }
.timeline-text strong { color: var(--text); }

.kanban { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 16px; }
.kanban-col { min-width: 220px; flex: 1; }
.kanban-col-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 10px 14px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; }
.kanban-col-body { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; padding: 8px; min-height: 120px; }
.kanban-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; transition: all 0.2s; font-size: 13px; }
.kanban-card:hover { border-color: var(--blue); transform: translateY(-1px); }
.kanban-card-name { font-weight: 600; margin-bottom: 4px; }
.kanban-card-meta { font-size: 11px; color: var(--text-dim); display: flex; justify-content: space-between; }

.stat-mini { text-align: center; padding: 16px; }
.stat-mini-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.stat-mini-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; font-weight: 500; }

.sop-steps { display: flex; align-items: center; gap: 0; margin: 20px 0; }
.sop-step { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 600; transition: all 0.3s; }
.sop-step.done { color: var(--green); background: var(--green-bg); }
.sop-step.current { color: var(--blue); background: var(--blue-bg); box-shadow: 0 0 0 2px rgba(79,140,255,0.3); }
.sop-step.pending { color: var(--text-muted); }
.sop-arrow { color: var(--text-muted); font-size: 14px; margin: 0 4px; }
.sop-step-num { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; }
.sop-step.done .sop-step-num { background: var(--green); color: #fff; }
.sop-step.current .sop-step-num { background: var(--blue); color: #fff; }
.sop-step.pending .sop-step-num { background: rgba(255,255,255,0.06); }

@media (max-width: 1024px) {
  .grid-sidebar { grid-template-columns: 1fr; }
  .kanban { flex-wrap: wrap; }
  .kanban-col { min-width: 100%; }
  .carrier-row { grid-template-columns: 1fr 1fr; gap: 8px; }
}
@media print {
  body { background: #fff; color: #000; }
  .nav-tabs, .action-bar, .action-btn, .wq-carrier-actions, .manual-entry-form { display: none !important; }
  .card { background: #fff; border: 1px solid #ddd; break-inside: avoid; }
  .comparison-table th, .wq-comparison-table th { background: #f5f5f5; color: #333; }
  .comparison-table td, .wq-comparison-table td { color: #000; }
  .detail-name { color: #000; -webkit-text-fill-color: #000; }
}

// ─── CREATE GAUGE ─────────────────────────────────────
function createGauge(value, max, label, color, size) {
  size = size || 140;
  const pct = Math.min((value/max)*100, 100);
  const r = 60;
  const circ = Math.PI * r;
  const initialOffset = circ;
  const finalOffset = circ - (pct/100)*circ;

  const container = document.createElement("div");
  container.className = "gauge";

  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("width", size);
  svg.setAttribute("height", size * 0.65);
  svg.setAttribute("viewBox", "0 0 160 104");
  svg.className = "gauge-svg";

  const bg = document.createElementNS("http://www.w3.org/2000/svg", "path");
  bg.setAttribute("d", "M 20 80 A 60 60 0 0 1 140 80");
  bg.setAttribute("fill", "none");
  bg.setAttribute("stroke", "rgba(255,255,255,0.06)");
  bg.setAttribute("stroke-width", "12");
  bg.setAttribute("stroke-linecap", "round");

  const fill = document.createElementNS("http://www.w3.org/2000/svg", "path");
  fill.setAttribute("d", "M 20 80 A 60 60 0 0 1 140 80");
  fill.setAttribute("fill", "none");
  fill.setAttribute("stroke", color);
  fill.setAttribute("stroke-width", "12");
  fill.setAttribute("stroke-linecap", "round");
  fill.setAttribute("stroke-dasharray", circ);
  fill.setAttribute("stroke-dashoffset", initialOffset);
  fill.style.transition = "stroke-dashoffset 1.5s cubic-bezier(0.22,1,0.36,1)";

  svg.appendChild(bg);
  svg.appendChild(fill);

  const value_div = document.createElement("div");
  value_div.className = "gauge-value";
  value_div.style.color = color;
  value_div.textContent = pct.toFixed(1) + "%";

  const label_div = document.createElement("div");
  label_div.className = "gauge-label";
  label_div.textContent = label;

  container.appendChild(svg);
  container.appendChild(value_div);
  container.appendChild(label_div);

  setTimeout(() => {
    fill.setAttribute("stroke-dashoffset", finalOffset);
  }, 200);

  return container;
}

// ─── CREATE HEALTH RING ─────────────────────────────────
function createHealthRing(score) {
  const r = 42;
  const c = 2 * Math.PI * r;
  const pct = Math.min(score / 100, 1);
  const initialOffset = c;
  const finalOffset = c - (pct * c);

  let color = C.red;
  if (score >= 80) color = C.green;
  else if (score >= 60) color = C.blue;
  else if (score >= 40) color = C.amber;

  const container = document.createElement("div");
  container.className = "health-ring";

  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", "0 0 100 100");
  svg.style.transform = "rotate(-90deg)";

  const bg_circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  bg_circle.setAttribute("cx", "50");
  bg_circle.setAttribute("cy", "50");
  bg_circle.setAttribute("r", r);
  bg_circle.setAttribute("fill", "none");
  bg_circle.setAttribute("stroke", "rgba(255,255,255,0.06)");
  bg_circle.setAttribute("stroke-width", "8");

  const fill_circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  fill_circle.setAttribute("cx", "50");
  fill_circle.setAttribute("cy", "50");
  fill_circle.setAttribute("r", r);
  fill_circle.setAttribute("fill", "none");
  fill_circle.setAttribute("stroke", color);
  fill_circle.setAttribute("stroke-width", "8");
  fill_circle.setAttribute("stroke-dasharray", c);
  fill_circle.setAttribute("stroke-dashoffset", initialOffset);
  fill_circle.setAttribute("stroke-linecap", "round");
  fill_circle.style.transition = "stroke-dashoffset 1.5s cubic-bezier(0.22,1,0.36,1)";

  svg.appendChild(bg_circle);
  svg.appendChild(fill_circle);

  const value_div = document.createElement("div");
  value_div.className = "health-ring-value";
  value_div.style.color = color;
  value_div.textContent = score;

  container.appendChild(svg);
  container.appendChild(value_div);

  setTimeout(() => {
    fill_circle.setAttribute("stroke-dashoffset", finalOffset);
  }, 300);

  return container;
}

// ─── CREATE MONTHLY CHART ─────────────────────────────
function createMonthlyChart(labels, newPremiums, renewPremiums) {
  const mx = Math.max(...newPremiums.map((v, i) => v + renewPremiums[i]), 1);
  const cm = new Date().getMonth();

  const container = document.createElement("div");

  const chart = document.createElement("div");
  chart.className = "monthly-chart";

  labels.forEach((m, i) => {
    const nH = (newPremiums[i] / mx) * 140;
    const rH = (renewPremiums[i] / mx) * 140;
    const active = newPremiums[i] > 0 || renewPremiums[i] > 0;

    const bar_container = document.createElement("div");
    bar_container.className = "monthly-chart-bar";

    const col = document.createElement("div");
    col.className = "monthly-chart-col";

    const new_bar = document.createElement("div");
    new_bar.className = "chart-bar";
    new_bar.style.background = "linear-gradient(180deg,#4f8cff,#3670d4)";
    new_bar.style.opacity = active ? "1" : "0.25";
    new_bar.title = m + " New: " + fmt(newPremiums[i]);
    new_bar.style.minHeight = "2px";
    new_bar.style.height = "2px";

    const ren_bar = document.createElement("div");
    ren_bar.className = "chart-bar";
    ren_bar.style.background = "linear-gradient(180deg,#34d399,#20b880)";
    ren_bar.style.opacity = active ? "1" : "0.25";
    ren_bar.title = m + " Ren: " + fmt(renewPremiums[i]);
    ren_bar.style.minHeight = "2px";
    ren_bar.style.height = "2px";

    col.appendChild(new_bar);
    col.appendChild(ren_bar);

    const label = document.createElement("span");
    label.className = i === cm ? "chart-label current" : "chart-label";
    label.textContent = m;

    bar_container.appendChild(col);
    bar_container.appendChild(label);
    chart.appendChild(bar_container);

    setTimeout(() => {
      new_bar.style.height = Math.max(nH, 2) + "px";
      ren_bar.style.height = Math.max(rH, 2) + "px";
    }, 100 + i * 60);
  });

  const legend = document.createElement("div");
  legend.className = "chart-legend";
  const item1 = document.createElement("div");
  item1.className = "chart-legend-item";
  const dot1 = document.createElement("div");
  dot1.className = "chart-legend-dot";
  dot1.style.background = "#4f8cff";
  item1.appendChild(dot1);
  item1.appendChild(document.createTextNode(" New Business"));

  const item2 = document.createElement("div");
  item2.className = "chart-legend-item";
  const dot2 = document.createElement("div");
  dot2.className = "chart-legend-dot";
  dot2.style.background = "#34d399";
  item2.appendChild(dot2);
  item2.appendChild(document.createTextNode(" Renewals"));

  legend.appendChild(item1);
  legend.appendChild(item2);

  container.appendChild(chart);
  container.appendChild(legend);

  return container;
}

// ─── CREATE PROGRESS BAR ──────────────────────────────
function createProgressBar(value, max, color, label) {
  const pct = Math.min((value/max)*100, 100);
  const container = document.createElement("div");
  container.className = "progress-bar-container";

  const labelDiv = document.createElement("div");
  labelDiv.className = "progress-bar-label";
  const lbl = document.createElement("span");
  lbl.textContent = label;
  const pctSpan = document.createElement("span");
  pctSpan.className = "pct";
  pctSpan.textContent = pct.toFixed(1) + "%";
  labelDiv.appendChild(lbl);
  labelDiv.appendChild(pctSpan);

  const track = document.createElement("div");
  track.className = "progress-bar-track";

  const fill = document.createElement("div");
  fill.className = "progress-bar-fill";
  fill.style.background = color;
  fill.style.width = "0%";

  track.appendChild(fill);
  container.appendChild(labelDiv);
  container.appendChild(track);

  setTimeout(() => {
    fill.style.width = pct + "%";
  }, 300);

  return container;
}

  nqShowStep();

}

  var idx = nqData.carriers.indexOf(c);
  if (idx >= 0) nqData.carriers.splice(idx,1); else nqData.carriers.push(c);
  nqRenderStep1();
}
function nqSetSource(s) {
  nqSource = s;
  nqRenderStep1();
}

// ── Upload Wiring ──
function nqWireUpload() {
  var zone = document.getElementById("nq-upload-zone");
  var inp = document.getElementById("nq-file-input");
  if (!zone || !inp) return;
  zone.onclick = function(){ inp.click(); };
  inp.onchange = function(){ if(inp.files.length) nqHandleFiles(inp.files); inp.value=""; };
  zone.ondragover = function(e){ e.preventDefault(); zone.classList.add("dragover"); };
  zone.ondragleave = function(){ zone.classList.remove("dragover"); };
  zone.ondrop = function(e){ e.preventDefault(); zone.classList.remove("dragover"); if(e.dataTransfer.files.length) nqHandleFiles(e.dataTransfer.files); };
}

var nqFiles = []; // {id, name, size, status, errorMsg, base64, structuredData}
var nqUploadQueue = []; // queue of {file, fileObj} waiting to be sent to server
var nqUploadInProgress = false; // only ONE server extraction at a time

function nqHandleFiles(fileList) {
  console.log("[Dec Upload] nqHandleFiles called with", fileList.length, "file(s):",
    Array.from(fileList).map(function(f){return f.name;}).join(", "));
  for (var i = 0; i < fileList.length; i++) {
    var f = fileList[i];
    var obj = { id:"nf_"+Date.now()+"_"+i, name:f.name, size:f.size, status:"reading", errorMsg:"", base64:null, structuredData:null };
    nqFiles.push(obj);
    nqReadFile(f, obj);
  }
  console.log("[Dec Upload] nqFiles now has", nqFiles.length, "file(s):", nqFiles.map(function(f){return f.name+"("+f.status+")";}).join(", "));
  nqRenderFiles();
}

// Step 1: Read the file into base64, then queue it for server extraction
function nqReadFile(file, fileObj) {
  var reader = new FileReader();
  reader.onload = function(e) {
    fileObj.base64 = e.target.result.split(",")[1];
    fileObj.status = "queued";
    console.log("[Dec Upload] File read complete:", fileObj.name, "| queuing for extraction");
    nqRenderFiles();
    // Add to queue and process
    nqUploadQueue.push({ file: file, fileObj: fileObj });
    nqProcessNextInQueue();
  };
  reader.onerror = function() { fileObj.status = "error"; fileObj.errorMsg = "Could not read file"; nqRenderFiles(); nqCheckAutoAdvance(); };
  reader.readAsDataURL(file);
}

// Step 2: Process queue ONE AT A TIME to avoid Claude API rate limits
function nqProcessNextInQueue() {
  if (nqUploadInProgress) {
    console.log("[Dec Upload] Upload in progress, waiting in queue. Queue length:", nqUploadQueue.length);
    return;
  }
  if (nqUploadQueue.length === 0) {
    console.log("[Dec Upload] Queue empty, nothing to process.");
    return;
  }
  var item = nqUploadQueue.shift();
  nqUploadInProgress = true;
  nqSendToServer(item.file, item.fileObj);
}

// Step 3: Send one file to server for extraction
function nqSendToServer(file, fileObj) {
  fileObj.status = "uploading";
  nqRenderFiles();
  console.log("[Dec Upload] Sending to server:", fileObj.name, "| remaining in queue:", nqUploadQueue.length);

  fetchGS("actionUploadQhFile", function(r) {
    console.log("[Dec Upload] fetchGS SUCCESS for", fileObj.name, "| r.ok:", r && r.ok, "| has r.data:", !!(r && r.data));
    if (r && r.ok && r.data) {
      fileObj.status = "done";
      fileObj.structuredData = r.data.structuredData || null;
      fileObj.extractedText = r.data.extractedText || "";
      fileObj.extractionMethod = r.data.extractionMethod || "unknown";
      fileObj.extractionError = r.data.extractionError || null;
      console.log("[Dec Upload]", fileObj.name, "| structuredData:", fileObj.structuredData ? "YES (keys: " + Object.keys(fileObj.structuredData).join(",") + ")" : "NULL",
        "| method:", fileObj.extractionMethod, "| extractionError:", fileObj.extractionError);
      if (r.data.structuredData) {
        console.log("[Dec Upload]", fileObj.name, "| docType:", r.data.structuredData.documentType,
          "| lobs:", JSON.stringify(r.data.structuredData.linesOfBusiness),
          "| premium:", r.data.structuredData.annualPremium,
          "| carrier:", r.data.structuredData.currentCarrier);
        nqAutoFillFromExtraction(r.data.structuredData);
      } else {
        console.warn("[Dec Upload] *** NO structuredData for", fileObj.name, "*** method:", fileObj.extractionMethod, "error:", fileObj.extractionError);
        fileObj.errorMsg = "Extraction returned no structured data" + (fileObj.extractionError ? ": " + fileObj.extractionError : "");
      }
    } else {
      fileObj.status = "error";
      fileObj.errorMsg = (r && r.error) ? r.error : "Upload failed";
      console.error("[Dec Upload] FAILED response for", fileObj.name, "| error:", fileObj.errorMsg, "| full response keys:", r ? Object.keys(r).join(",") : "null");
    }
    nqRenderFiles();
    nqCheckAutoAdvance();
    // Release lock and process next file after cooldown to avoid API rate limits
    nqUploadInProgress = false;
    if (nqUploadQueue.length > 0) {
      console.log("[Dec Upload] Cooldown 5s before next file to avoid API rate limits...");
      setTimeout(nqProcessNextInQueue, 5000);
    }
  }, function(err) {
    fileObj.status = "error";
    fileObj.errorMsg = (err && err.message) ? err.message : "Upload failed";
    console.error("[Dec Upload] fetchGS ERROR for", fileObj.name, ":", fileObj.errorMsg);
    nqRenderFiles();
    nqCheckAutoAdvance();
    nqUploadInProgress = false;
    if (nqUploadQueue.length > 0) {
      setTimeout(nqProcessNextInQueue, 5000);
    }
  }, { fileName:file.name, mimeType:file.type, data:fileObj.base64, purpose:"quote" });
}

function nqRenderFiles() {
  var el = document.getElementById("nq-file-list");
  if (!el) return;
  var h = "";
  nqFiles.forEach(function(f) {
    var statusCls = f.status==="done" ? "nq-file-ok" : f.status==="error" ? "nq-file-err" : "nq-file-wait";
    var statusText = f.status==="done" ? "Extracted" : f.status==="error" ? "Error" : f.status==="uploading" ? "Extracting..." : f.status==="queued" ? "Waiting..." : "Reading...";
    h += '<div class="nq-file-item">';
    h += '<span style="color:'+C.t1+';">'+f.name+' <span style="color:'+C.t3+';font-size:11px;">'+Math.round(f.size/1024)+'KB</span></span>';
    h += '<span class="nq-file-status '+statusCls+'">'+statusText+'</span>';
    h += '</div>';
    if (f.status==="error" && f.errorMsg) {
      h += '<div style="font-size:11px;color:'+C.red+';padding:2px 12px;margin-bottom:4px;">'+f.errorMsg+'</div>';
    }
  });
  el.innerHTML = h;
}

// ── Auto-fill from Dec Page Extraction ──
// Designed to be called MULTIPLE TIMES (once per uploaded file).
// Uses MERGE logic: only fills empty fields, accumulates premiums, appends LOBs.
// Track extraction count for merge awareness.
var nqExtractCount = 0;
// Store per-policy premiums for notes
var nqPolicyPremiums = [];

function nqAutoFillFromExtraction(sd) {
  // sd = structuredData from Claude extraction
  if (!sd) return;
  nqExtractCount++;

  // Handle driver's license uploads
  if (sd.documentType === "drivers_license") {
    console.log("[Dec Extract #" + nqExtractCount + "] Driver's License detected");
    var dl = sd.client || sd.insured || sd;
    if (dl.firstName && !nqData.firstName) nqData.firstName = dl.firstName;
    if (dl.middleName && !nqData.middleName) nqData.middleName = dl.middleName;
    if (dl.lastName && !nqData.lastName) nqData.lastName = dl.lastName;
    if ((dl.dateOfBirth || dl.dob) && !nqData.dob) nqData.dob = dl.dateOfBirth || dl.dob;
    if (dl.address && !nqData.address) nqData.address = dl.address;
    if (dl.city && !nqData.city) nqData.city = dl.city;
    if (dl.state) nqData.state = dl.state;
    if ((dl.zip || dl.zipCode) && !nqData.zip) nqData.zip = dl.zip || dl.zipCode;
    if ((dl.licenseNumber || dl.dlNumber) && !nqData.dlNumber) nqData.dlNumber = dl.licenseNumber || dl.dlNumber;
    if (dl.gender) {
      // Could add to first driver
      var hasDrivers = nqData.drivers.some(function(d) { return d.name && d.name.trim(); });
      if (!hasDrivers && nqData.firstName) {
        nqData.drivers[0].name = ((nqData.firstName||"") + " " + (nqData.lastName||"")).trim();
        nqData.drivers[0].dob = nqData.dob || "";
        nqData.drivers[0].dl = nqData.dlNumber || "";
        nqData.drivers[0].relationship = "Named Insured";
      }
    }
    return; // DL is not a policy doc — don't process further
  }

  var isMultiFile = nqExtractCount > 1;
  console.log("[Dec Extract #" + nqExtractCount + "] structuredData keys:", Object.keys(sd));
  console.log("[Dec Extract #" + nqExtractCount + "] documentType:", sd.documentType, "| linesOfBusiness:", sd.linesOfBusiness);
  console.log("[Dec Extract #" + nqExtractCount + "] carrier:", sd.currentCarrier, "| premium:", sd.annualPremium);
  if (sd.coverages) console.log("[Dec Extract #" + nqExtractCount + "] coverage keys:", Object.keys(sd.coverages));
  if (sd.property) console.log("[Dec Extract #" + nqExtractCount + "] property keys:", Object.keys(sd.property));

  // ── 1. CLIENT / INSURED DATA (fill if empty) ──
  var ins = sd.insured || sd.namedInsured || sd.policyHolder || sd.client || sd.applicant || null;
  if (!ins && (sd.firstName || sd.lastName || sd.name || sd.insuredName || sd.namedInsuredName)) {
    ins = sd;
  }

  if (ins) {
    if (ins.firstName && !nqData.firstName) nqData.firstName = ins.firstName;
    if (ins.lastName && !nqData.lastName) nqData.lastName = ins.lastName;
    if (ins.middleName && !nqData.middleName) nqData.middleName = ins.middleName;
    // Handle full name fields
    var fullName = ins.fullName || ins.name || ins.insuredName || ins.namedInsuredName || "";
    if (fullName && !nqData.firstName) {
      var parts = fullName.trim().split(/\s+/);
      if (parts.length >= 3) {
        nqData.firstName = parts[0];
        nqData.middleName = parts.slice(1, parts.length - 1).join(" ");
        nqData.lastName = parts[parts.length - 1];
      } else if (parts.length === 2) {
        nqData.firstName = parts[0];
        nqData.lastName = parts[1];
      } else {
        nqData.firstName = parts[0] || "";
      }
    }
    if (!nqData.address && (ins.address || ins.streetAddress || ins.mailingAddress)) nqData.address = ins.address || ins.streetAddress || ins.mailingAddress;
    if (!nqData.city && ins.city) nqData.city = ins.city;
    if (ins.state) nqData.state = ins.state;
    if (!nqData.zip && (ins.zip || ins.zipCode || ins.postalCode)) nqData.zip = ins.zip || ins.zipCode || ins.postalCode;
    if (!nqData.phone && (ins.phone || ins.phoneNumber)) nqData.phone = ins.phone || ins.phoneNumber;
    if (!nqData.email && (ins.email || ins.emailAddress)) nqData.email = ins.email || ins.emailAddress;
    if (!nqData.dob && (ins.dateOfBirth || ins.dob)) nqData.dob = ins.dateOfBirth || ins.dob;
    if (!nqData.dlNumber && (ins.driversLicense || ins.dlNumber || ins.licenseNumber)) nqData.dlNumber = ins.driversLicense || ins.dlNumber || ins.licenseNumber;
    if (!nqData.coInsured && (ins.coInsured || ins.coApplicant || ins.spouse)) nqData.coInsured = ins.coInsured || ins.coApplicant || ins.spouse;
  }

  // ── 2. NAMED INSUREDS (for middle name, co-insured list) ──
  if (sd.namedInsureds && sd.namedInsureds.length > 0) {
    var primary = sd.namedInsureds[0];
    if (primary.middleName && !nqData.middleName) nqData.middleName = primary.middleName;
    if (primary.firstName && !nqData.firstName) nqData.firstName = primary.firstName;
    if (primary.lastName && !nqData.lastName) nqData.lastName = primary.lastName;
    if (primary.fullName && !nqData.middleName) {
      var np = primary.fullName.trim().split(/\s+/);
      if (np.length >= 3) nqData.middleName = np.slice(1, np.length - 1).join(" ");
    }
    if (primary.dateOfBirth && !nqData.dob) nqData.dob = primary.dateOfBirth;
    if (primary.licenseNumber && !nqData.dlNumber) nqData.dlNumber = primary.licenseNumber;
    if (primary.phone && !nqData.phone) nqData.phone = primary.phone;
    if (primary.email && !nqData.email) nqData.email = primary.email;
    if (sd.namedInsureds.length > 1 && !nqData.coInsured) {
      var coNames = [];
      for (var ni = 1; ni < sd.namedInsureds.length; ni++) {
        var n = sd.namedInsureds[ni];
        var fullN = (n.fullName || ((n.firstName||"") + " " + (n.lastName||n.name||"")).trim()).trim();
        if (fullN) coNames.push(fullN);
      }
      if (coNames.length > 0) nqData.coInsured = coNames.join(", ");
    }
  }

  // ── 3. POLICY INFO — MERGE-AWARE for multi-file uploads ──
  // Carrier: use first non-empty (should be same carrier for all policies from same insurer)
  var thisCarrier = sd.currentCarrier || (sd.policy && sd.policy.carrier) || "";
  if (thisCarrier && !nqData.currentCarrier) nqData.currentCarrier = thisCarrier;

  // Premium: ACCUMULATE across files, don't overwrite
  var thisPremium = sd.annualPremium || (sd.policy && sd.policy.premium) || 0;
  if (thisPremium) {
    var premNum = parseFloat(thisPremium) || 0;
    // Determine LOB label for this extraction
    var thisLob = (sd.linesOfBusiness && sd.linesOfBusiness[0]) || sd.documentType || "policy";
    nqPolicyPremiums.push({ lob: thisLob, premium: premNum });
    // Sum ALL policy premiums for total
    var totalPrem = 0;
    nqPolicyPremiums.forEach(function(pp) { totalPrem += pp.premium; });
    nqData.currentPremium = String(totalPrem);
    console.log("[Dec Extract] Premium merge: this=" + premNum + " (" + thisLob + "), total=" + totalPrem, "| all:", JSON.stringify(nqPolicyPremiums));
  }

  // Policy#: APPEND for multi-file (show all policy numbers)
  var thisPolicyNum = sd.policyNumber || (sd.policy && sd.policy.policyNumber) || "";
  if (thisPolicyNum) {
    if (!nqData.policyNumber) {
      nqData.policyNumber = thisPolicyNum;
    } else if (nqData.policyNumber.indexOf(thisPolicyNum) < 0) {
      // Different policy number — append with separator
      nqData.policyNumber = nqData.policyNumber + " / " + thisPolicyNum;
    }
  }

  // Dates: use earliest effective and latest expiration
  var thisEffective = sd.effectiveDate || (sd.policy && sd.policy.effectiveDate) || "";
  var thisExpiration = sd.expirationDate || (sd.policy && sd.policy.expirationDate) || "";
  if (thisEffective && !nqData.effectiveDate) nqData.effectiveDate = thisEffective;
  if (thisExpiration && !nqData.expirationDate) nqData.expirationDate = thisExpiration;

  // ── 4. LINES OF BUSINESS — always accumulate ──
  var validLobs = ["personal_auto","personal_home","personal_umbrella","personal_renters",
                   "commercial_gl","commercial_auto","commercial_property","commercial_bop","commercial_wc","commercial_umbrella"];

  // From linesOfBusiness array
  if (sd.linesOfBusiness && sd.linesOfBusiness.length > 0) {
    sd.linesOfBusiness.forEach(function(lob) {
      var lobLower = String(lob).toLowerCase().replace(/\s+/g, "_");
      if (validLobs.indexOf(lobLower) >= 0 && nqData.lobs.indexOf(lobLower) < 0) {
        nqData.lobs.push(lobLower);
      }
    });
  }
  // ALSO detect from documentType (always, not just when lobs is empty)
  if (sd.documentType) {
    var dt = sd.documentType.toLowerCase();
    var lobsToAdd = [];
    if (dt.indexOf("personal_auto") >= 0 || (dt.indexOf("auto") >= 0 && dt.indexOf("commercial") < 0)) lobsToAdd.push("personal_auto");
    if (dt.indexOf("personal_home") >= 0 || dt.indexOf("home") >= 0 || dt.indexOf("dwelling") >= 0 || dt.indexOf("property_owners") >= 0 || dt.indexOf("homeowners") >= 0) lobsToAdd.push("personal_home");
    if (dt.indexOf("personal_umbrella") >= 0 || (dt.indexOf("umbrella") >= 0 && dt.indexOf("commercial") < 0)) lobsToAdd.push("personal_umbrella");
    if (dt.indexOf("renters") >= 0) lobsToAdd.push("personal_renters");
    if (dt.indexOf("commercial_gl") >= 0 || dt.indexOf("general_liability") >= 0) lobsToAdd.push("commercial_gl");
    if (dt.indexOf("commercial_auto") >= 0) lobsToAdd.push("commercial_auto");
    if (dt.indexOf("commercial_property") >= 0) lobsToAdd.push("commercial_property");
    if (dt.indexOf("commercial_bop") >= 0 || dt.indexOf("bop") >= 0) lobsToAdd.push("commercial_bop");
    if (dt.indexOf("commercial_wc") >= 0 || dt.indexOf("workers_comp") >= 0) lobsToAdd.push("commercial_wc");
    if (dt.indexOf("commercial_umbrella") >= 0) lobsToAdd.push("commercial_umbrella");
    lobsToAdd.forEach(function(l) { if (nqData.lobs.indexOf(l) < 0) nqData.lobs.push(l); });
  }
  // Also detect from coverages: if dwelling is present → personal_home
  if (sd.coverages && sd.coverages.dwelling && nqData.lobs.indexOf("personal_home") < 0) {
    nqData.lobs.push("personal_home");
    console.log("[Dec Extract] Auto-detected personal_home from dwelling coverage");
  }
  // If BI/PD/vehicles present → personal_auto
  if ((sd.vehicles && sd.vehicles.length) || (sd.coverages && sd.coverages.bodilyInjury)) {
    if (nqData.lobs.indexOf("personal_auto") < 0) {
      nqData.lobs.push("personal_auto");
      console.log("[Dec Extract] Auto-detected personal_auto from vehicles/BI coverage");
    }
  }

  console.log("[Dec Extract #" + nqExtractCount + "] LOBs after merge:", nqData.lobs);

  // ── 5. VEHICLES — only replace if this extraction has them ──
  if (sd.vehicles && sd.vehicles.length) {
    // Check if current vehicles are just the blank default
    var hasRealVehicles = nqData.vehicles.some(function(v) { return v.year || v.make || v.vin; });
    if (!hasRealVehicles) {
      // Replace blank default with extracted vehicles
      nqData.vehicles = sd.vehicles.map(function(v) {
        return { year:String(v.year||""), make:v.make||"", model:v.model||"", vin:v.vin||"" };
      });
    }
    // If we already have real vehicles, don't overwrite (they came from a previous file)
  }

  // ── 6. DRIVERS — only replace if this extraction has them ──
  if (sd.drivers && sd.drivers.length) {
    var hasRealDrivers = nqData.drivers.some(function(d) { return d.name && d.name.trim(); });
    if (!hasRealDrivers) {
      nqData.drivers = sd.drivers.map(function(d) {
        var driverName = d.fullName || ((d.firstName||"")+" "+(d.lastName||d.name||"")).trim();
        return { name:driverName, dob:d.dateOfBirth||d.dob||"", dl:d.licenseNumber||d.dl||"", dlState:d.licenseState||d.dlState||"TN", relationship:d.relation||d.relationship||"" };
      });
    }
  }

  // ── 7. PROPERTY — fill if empty ──
  if (sd.property) {
    var p = sd.property;
    if (p.address && !nqData.propAddress) nqData.propAddress = p.address;
    if (p.yearBuilt && !nqData.yearBuilt) nqData.yearBuilt = String(p.yearBuilt);
    if ((p.squareFootage || p.squareFeet) && !nqData.sqft) nqData.sqft = String(p.squareFootage || p.squareFeet);
    if (p.stories && !nqData.stories) nqData.stories = String(p.stories);
    if (p.constructionType && !nqData.construction) nqData.construction = p.constructionType;
    if (p.roofType && !nqData.roofType) nqData.roofType = p.roofType;
    if (p.roofYear && !nqData.roofYear) nqData.roofYear = String(p.roofYear);
    if (p.heatingType && !nqData.heating) nqData.heating = p.heatingType;
  }

  // ── 8. COVERAGES — fill if empty (each field independent) ──
  if (sd.coverages) {
    var cov = sd.coverages;
    // Home coverages
    if (cov.dwelling && !nqData.dwelling) nqData.dwelling = String(cov.dwelling);
    if (cov.deductible && !nqData.deductible) nqData.deductible = String(cov.deductible);
    if (cov.otherStructures && !nqData.otherStructures) nqData.otherStructures = String(cov.otherStructures);
    if (cov.personalProperty && !nqData.personalProperty) nqData.personalProperty = String(cov.personalProperty);
    if (cov.lossOfUse && !nqData.lossOfUse) nqData.lossOfUse = String(cov.lossOfUse);
    if (cov.liability && !nqData.liability) nqData.liability = String(cov.liability);
    if (cov.medPay && !nqData.homeMedPay) {
      if (nqHasLob("home") || cov.dwelling) nqData.homeMedPay = String(cov.medPay);
    }
    if (cov.windHailDeductible && !nqData.windHailDeductible) nqData.windHailDeductible = String(cov.windHailDeductible);
    if (cov.medPayPerPerson && !nqData.medPayPerPerson) nqData.medPayPerPerson = String(cov.medPayPerPerson);
    if (cov.medPayPerOccurrence && !nqData.medPayPerOccurrence) nqData.medPayPerOccurrence = String(cov.medPayPerOccurrence);
    if (cov.accidentalDeathBenefit && !nqData.accidentalDeathBenefit) nqData.accidentalDeathBenefit = String(cov.accidentalDeathBenefit);
    // Auto coverages
    if (cov.bodilyInjury && !nqData.bodilyInjury) nqData.bodilyInjury = String(cov.bodilyInjury);
    if (cov.propertyDamage && !nqData.propertyDamage) nqData.propertyDamage = String(cov.propertyDamage);
    if (cov.medicalPayments && !nqData.autoMedPay) nqData.autoMedPay = String(cov.medicalPayments);
    if (cov.umUim && !nqData.umUim) nqData.umUim = String(cov.umUim);
    if (cov.umPd && !nqData.umPd) nqData.umPd = String(cov.umPd);
    if (cov.compDeductible && !nqData.compDeductible) nqData.compDeductible = String(cov.compDeductible);
    if (cov.collisionDeductible && !nqData.collisionDeductible) nqData.collisionDeductible = String(cov.collisionDeductible);
    if (cov.rental && !nqData.rental) nqData.rental = String(cov.rental);
    if (cov.towing && !nqData.towing) nqData.towing = String(cov.towing);
    if (cov.roadside && !nqData.roadside) nqData.roadside = String(cov.roadside);
    if (cov.rentalDays && !nqData.rentalDays) nqData.rentalDays = String(cov.rentalDays);
    // Commercial GL / BOP coverages
    if (cov.glEachOccurrence && !nqData.glEachOccurrence) nqData.glEachOccurrence = String(cov.glEachOccurrence);
    if (cov.glGeneralAggregate && !nqData.glGeneralAggregate) nqData.glGeneralAggregate = String(cov.glGeneralAggregate);
    if (cov.glProductsCompOps && !nqData.glProductsCompOps) nqData.glProductsCompOps = String(cov.glProductsCompOps);
    if (cov.glPersonalAdvInjury && !nqData.glPersonalAdvInjury) nqData.glPersonalAdvInjury = String(cov.glPersonalAdvInjury);
    if (cov.glDamageRentedPremises && !nqData.glDamageRentedPremises) nqData.glDamageRentedPremises = String(cov.glDamageRentedPremises);
    if (cov.glMedicalExpense && !nqData.glMedicalExpense) nqData.glMedicalExpense = String(cov.glMedicalExpense);
    if (cov.buildingValue && !nqData.buildingValue) nqData.buildingValue = String(cov.buildingValue);
    if (cov.bppContents && !nqData.bppContents) nqData.bppContents = String(cov.bppContents);
    if (cov.businessIncome && !nqData.businessIncome) nqData.businessIncome = String(cov.businessIncome);
    if (cov.wcPartOne && !nqData.wcPartOne) nqData.wcPartOne = String(cov.wcPartOne);
    if (cov.wcElEachAccident && !nqData.wcElEachAccident) nqData.wcElEachAccident = String(cov.wcElEachAccident);
    if (cov.wcElDiseasePolicy && !nqData.wcElDiseasePolicy) nqData.wcElDiseasePolicy = String(cov.wcElDiseasePolicy);
    if (cov.wcElDiseaseEach && !nqData.wcElDiseaseEach) nqData.wcElDiseaseEach = String(cov.wcElDiseaseEach);
    // Merge coverages objects (don't replace, extend)
    if (!nqData._extractedCoverages) nqData._extractedCoverages = {};
    Object.keys(cov).forEach(function(k) { if (k.charAt(0) !== "_") nqData._extractedCoverages[k] = cov[k]; });
  }

  // ── 8b. ADDITIONAL COVERAGES / ENDORSEMENTS ──
  if (sd.additionalCoverages && sd.additionalCoverages.length > 0) {
    var schedItems = sd.additionalCoverages.map(function(ac) {
      var desc = ac.name || ac.description || "Item";
      if (ac.limit) desc += " — $" + ac.limit;
      if (ac.premium) desc += " (prem: $" + ac.premium + ")";
      return desc;
    }).join("; ");
    if (schedItems && !nqData.scheduledProperty) nqData.scheduledProperty = schedItems;
  }

  // ── 8c. DISCOUNTS ──
  if (sd.discounts && sd.discounts.length > 0 && !nqData.discounts) {
    nqData.discounts = sd.discounts.join(", ");
  }

  // ── 9. COMMERCIAL / BUSINESS — fill if empty ──
  var biz = sd.commercial || sd.business || null;
  if (biz) {
    if ((biz.businessName || biz.name) && !nqData.bizName) nqData.bizName = biz.businessName || biz.name;
    if (biz.fein && !nqData.fein) nqData.fein = biz.fein;
    if ((biz.businessType || biz.type) && !nqData.bizType) nqData.bizType = biz.businessType || biz.type;
    if (biz.yearsInBusiness && !nqData.yearsInBiz) nqData.yearsInBiz = String(biz.yearsInBusiness);
    if ((biz.numberOfEmployees || biz.employees) && !nqData.employees) nqData.employees = String(biz.numberOfEmployees || biz.employees);
    if ((biz.annualRevenue || biz.revenue) && !nqData.revenue) nqData.revenue = String(biz.annualRevenue || biz.revenue);
    if ((biz.annualPayroll || biz.payroll) && !nqData.payroll) nqData.payroll = String(biz.annualPayroll || biz.payroll);
    if ((biz.classificationCode || biz.naics || biz.classCode) && !nqData.naics) nqData.naics = biz.classificationCode || biz.naics || biz.classCode;
    if ((biz.businessAddress || biz.address) && !nqData.bizAddress) nqData.bizAddress = biz.businessAddress || biz.address;
    if (biz.operations && !nqData.operations) nqData.operations = biz.operations;
  }

  // ── 10. UMBRELLA — fill if empty ──
  if (sd.umbrella) {
    var u = sd.umbrella;
    if (u.limit && !nqData.umbrellaLimit) nqData.umbrellaLimit = String(u.limit);
    if (u.underlyingAutoBI && !nqData.underlyingAuto) nqData.underlyingAuto = String(u.underlyingAutoBI);
    if (u.underlyingHomeLiab && !nqData.underlyingHome) nqData.underlyingHome = String(u.underlyingHomeLiab);
    if (u.underlyingAutoCarrier && !nqData.umbrellaAutoCarrier) nqData.umbrellaAutoCarrier = u.underlyingAutoCarrier;
    if (u.underlyingHomeCarrier && !nqData.umbrellaHomeCarrier) nqData.umbrellaHomeCarrier = u.underlyingHomeCarrier;
    if (u.numberOfVehicles && !nqData.umbrellaVehicles) nqData.umbrellaVehicles = String(u.numberOfVehicles);
    if (u.numberOfProperties && !nqData.umbrellaProperties) nqData.umbrellaProperties = String(u.numberOfProperties);
    if (u.watercraft) nqData.umbrellaWatercraft = u.watercraft;
  }

  // ── 11. EXTRACTION NOTES — always append ──
  if (sd._extractionNotes) nqData.notes = (nqData.notes ? nqData.notes + "\n" : "") + "AI Notes: " + sd._extractionNotes;
  // Add per-policy premium breakdown to notes on subsequent files
  if (isMultiFile && nqPolicyPremiums.length > 1) {
    var premNote = "Policy premiums: " + nqPolicyPremiums.map(function(pp) { return pp.lob + ": $" + pp.premium.toLocaleString(); }).join(", ") + " | Total: $" + nqData.currentPremium;
    // Replace any existing premium breakdown note
    nqData.notes = (nqData.notes || "").replace(/Policy premiums:.*$/m, "").trim();
    nqData.notes = (nqData.notes ? nqData.notes + "\n" : "") + premNote;
  }

  console.log("[Dec Extract #" + nqExtractCount + "] FINAL STATE — name:", nqData.firstName, nqData.middleName, nqData.lastName,
    "| carrier:", nqData.currentCarrier, "| premium:", nqData.currentPremium,
    "| lobs:", JSON.stringify(nqData.lobs), "| dwelling:", nqData.dwelling, "| deductible:", nqData.deductible,
    "| BI:", nqData.bodilyInjury, "| property:", nqData.yearBuilt, nqData.construction);
}

function nqCheckAutoAdvance() {
  // If all files are processed and we have data, show success on Step 1
  var allDone = nqFiles.length > 0 && nqFiles.every(function(f){ return f.status==="done" || f.status==="error"; });
  var hasData = nqData.firstName || nqData.lastName;
  var fileStatuses = nqFiles.map(function(f){return f.name+"("+f.status+")"+(f.structuredData?" SD:YES":" SD:NO");}).join(", ");
  var filesWithData = nqFiles.filter(function(f){ return f.structuredData; }).length;
  console.log("[Dec Extract] autoAdvance check — allDone:", allDone, "hasData:", hasData, "source:", nqSource,
    "files:", fileStatuses, "| filesWithData:", filesWithData, "/" + nqFiles.length,
    "| extractCount:", nqExtractCount, "| lobs:", JSON.stringify(nqData.lobs),
    "| premium:", nqData.currentPremium, "| policyPremiums:", JSON.stringify(nqPolicyPremiums));

  if (allDone && nqSource === "dec") {
    // STAY on Step 1 — show success banner with extracted LOBs highlighted
    // User can add more files, adjust LOBs, then click Next to proceed
    nqRenderStep1(); // Re-render to show extracted LOBs as selected
    nqRenderFiles(); // Re-populate file list (nqRenderStep1 creates empty div)
    nqShowExtractBanner(hasData);
    console.log("[Dec Extract] All files processed. Staying on Step 1. extractCount:", nqExtractCount,
      "| lobs:", JSON.stringify(nqData.lobs), "| premium:", nqData.currentPremium);
  }
}

function nqShowExtractBanner(hasName) {
  var el = document.getElementById("nq-upload-area");
  if (!el) return;
  // Remove any existing banner
  var existing = document.getElementById("nq-extract-banner");
  if (existing) existing.remove();

  var lobStr = nqLobLabels().join(" + ") || "unknown";
  var premStr = nqData.currentPremium ? "$" + Number(nqData.currentPremium).toLocaleString() : "";
  var fileCount = nqFiles.filter(function(f){return f.status==="done";}).length;
  var errorCount = nqFiles.filter(function(f){return f.status==="error";}).length;
  var noDataCount = nqFiles.filter(function(f){return f.status==="done" && !f.structuredData;}).length;

  // Build per-file detail rows for diagnostic visibility
  var fileDetails = "";
  nqFiles.forEach(function(f) {
    var icon = f.status === "done" && f.structuredData ? "&#10003;" : f.status === "done" ? "&#9888;&#65039;" : "&#10060;";
    var color = f.status === "done" && f.structuredData ? C.green : f.status === "done" ? C.amber : C.red;
    var detail = "";
    if (f.structuredData) {
      var sd = f.structuredData;
      var fLobs = sd.linesOfBusiness ? sd.linesOfBusiness.join(", ") : (sd.documentType || "?");
      var fPrem = sd.annualPremium ? "$" + Number(sd.annualPremium).toLocaleString() : "";
      detail = fLobs + (fPrem ? " &mdash; " + fPrem : "");
    } else if (f.extractionError) {
      detail = '<span style="color:'+C.red+';">' + f.extractionError + '</span>';
    } else if (f.errorMsg) {
      detail = '<span style="color:'+C.red+';">' + f.errorMsg + '</span>';
    } else {
      detail = '<span style="color:'+C.amber+';">No data extracted</span>';
    }
    fileDetails += '<div style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:12px;">'
      + '<span style="color:'+color+';">'+icon+'</span>'
      + '<span style="color:'+C.t2+';">'+f.name+'</span>'
      + '<span style="color:'+C.t3+';">&mdash; '+detail+'</span>'
      + '</div>';
  });

  var msg;
  if (hasName) {
    msg = '<div id="nq-extract-banner" style="background:'+C.green+'20;border:1px solid '+C.green+'44;border-radius:10px;padding:14px 16px;margin-top:12px;">'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'
      + '<span style="font-size:18px;">&#10003;</span>'
      + '<span style="color:'+C.green+';font-weight:700;font-size:14px;">Extracted from ' + fileCount + ' file' + (fileCount>1?'s':'') + '!</span>'
      + '</div>'
      + '<div style="color:'+C.t2+';font-size:13px;line-height:1.6;">'
      + '<strong style="color:'+C.t1+';">' + ((nqData.firstName||"")+" "+(nqData.middleName||"")+" "+(nqData.lastName||"")).replace(/\s+/g," ").trim() + '</strong>'
      + (premStr ? ' &mdash; ' + premStr + ' total' : '')
      + '<br>Detected LOBs: <strong style="color:'+C.blue+';">' + lobStr + '</strong>'
      + '</div>'
      + fileDetails
      + '<div style="color:'+C.t3+';font-size:12px;margin-top:8px;">Upload more dec pages to add lines, or verify the LOBs below and click <strong>Next</strong>.</div>';
    if (errorCount > 0) {
      msg += '<div style="color:'+C.amber+';font-size:12px;margin-top:4px;">&#9888;&#65039; ' + errorCount + ' file(s) failed to extract.</div>';
    }
    if (noDataCount > 0) {
      msg += '<div style="color:'+C.amber+';font-size:12px;margin-top:4px;">&#9888;&#65039; ' + noDataCount + ' file(s) returned no structured data — AI may have failed to parse.</div>';
    }
    msg += '</div>';
  } else {
    msg = '<div id="nq-extract-banner" style="background:'+C.amber+'20;border:1px solid '+C.amber+'44;border-radius:10px;padding:14px 16px;margin-top:12px;">'
      + '<div style="display:flex;align-items:center;gap:8px;">'
      + '<span style="font-size:18px;">&#9888;&#65039;</span>'
      + '<span style="color:'+C.amber+';font-weight:600;font-size:13px;">Dec page processed but name not detected. Select your LOBs and click Next to fill in details.</span>'
      + '</div>'
      + fileDetails
      + '</div>';
  }
  el.insertAdjacentHTML("beforeend", msg);
}

  document.getElementById("nq-step-3").innerHTML = h;

function nqSaveStep3() {

  var simpleFields = ["bodilyInjury","propertyDamage","autoMedPay","umUim","compDeductible","collisionDeductible","roadside","rentalDays","usage","mileage","violations","propAddress","yearBuilt","sqft","stories","construction","roofType","roofYear","heating","dwelling","otherStructures","personalProperty","lossOfUse","liability","homeMedPay","medPayPerPerson","medPayPerOccurrence","deductible","windHailDeductible","accidentalDeathBenefit","bizName","fein","bizType","yearsInBiz","employees","revenue","payroll","naics","bizAddress","operations","glEachOccurrence","glGeneralAggregate","glProductsCompOps","glPersonalAdvInjury","glDamageRentedPremises","glMedicalExpense","buildingValue","bppContents","businessIncome","wcPartOne","wcElEachAccident","wcElDiseasePolicy","wcElDiseaseEach","commAutoBI","commAutoPD","commAutoUM","commAutoCompDed","commAutoCollDed","umbrellaLimit","underlyingAuto","underlyingHome","umbrellaAutoCarrier","umbrellaHomeCarrier","umbrellaVehicles","umbrellaProperties","umbrellaWatercraft","notes","discounts"];
  simpleFields.forEach(function(f){ var el=document.getElementById("nq-"+f); if(el) nqData[f]=el.value; });

  // Handle scheduled property textarea
  var scheduledPropertyEl = document.getElementById("nq-scheduledProperty");
  if (scheduledPropertyEl) nqData.scheduledProperty = scheduledPropertyEl.value;

  // Vehicles
  nqData.vehicles.forEach(function(v,i) {
    ["year","make","model","vin"].forEach(function(k) {
      var el = document.getElementById("nq-v-"+k+"-"+i);
      if (el) v[k] = el.value;
    });
  });

  // Drivers
  nqData.drivers.forEach(function(d,i) {
    ["name","dob","dl","dlState","rel"].forEach(function(k) {
      var el = document.getElementById("nq-d-"+k+"-"+i);
      if (el) {
        if (k === "rel") d.relationship = el.value;
        else d[k] = el.value;
      }
    });
  });
}

function nqAddVehicle() { nqSaveStep3(); nqData.vehicles.push({year:"",make:"",model:"",vin:""}); nqRenderStep3(); }
function nqRemoveVehicle(i) { nqSaveStep3(); nqData.vehicles.splice(i,1); nqRenderStep3(); }
function nqAddDriver() { nqSaveStep3(); nqData.drivers.push({name:"",dob:"",dl:"",dlState:"TN",relationship:""}); nqRenderStep3(); }
function nqRemoveDriver(i) { nqSaveStep3(); nqData.drivers.splice(i,1); nqRenderStep3(); }

function nqRenderStep4() {

    h += '</div></div>';
    h += '<div class="nq-review-section nq-review-amber"><div style="font-weight:700;font-size:13px;margin-bottom:8px;color:'+C.t1+';">Drivers ('+d.drivers.length+')</div><div class="nq-grid-2">';
    d.drivers.forEach(function(dr,i){ if(dr.name && dr.name.trim()) h+=nqRR("Driver "+(i+1),dr.name.trim()+(dr.relationship?" ("+dr.relationship+")":"")+(dr.dl?" — DL: "+dr.dl:"")); });
    h += nqRR("Usage",d.usage) + nqRR("Annual Mileage",d.mileage) + nqRR("Violations",d.violations);
    h += '</div></div>';
    // Auto coverages
    if (d.bodilyInjury || d.propertyDamage || d.compDeductible || d.collisionDeductible) {
      h += '<div class="nq-review-section nq-review-amber"><div style="font-weight:700;font-size:13px;margin-bottom:8px;color:'+C.t1+';">Current Auto Coverages</div><div class="nq-grid-2">';
      h += nqRR("Bodily Injury",d.bodilyInjury) + nqRR("Property Damage",d.propertyDamage);

      h += nqRR("Comp Deductible",d.compDeductible) + nqRR("Collision Deductible",d.collisionDeductible);

      if (d.rentalDays) h += nqRR("Rental Car Days",d.rentalDays);

    }

  // Home
  if (nqIsHome()) {

    h += nqRR("Year Built",d.yearBuilt) + nqRR("Sqft",d.sqft) + nqRR("Stories",d.stories) + nqRR("Construction",d.construction);
    h += nqRR("Roof",d.roofType+(d.roofYear?" ("+d.roofYear+")":"")) + nqRR("Heating",d.heating);

    h += '<div class="nq-review-section nq-review-purple"><div style="font-weight:700;font-size:13px;margin-bottom:8px;color:'+C.t1+';">Current Home Coverages</div><div class="nq-grid-2">';

    if (d.windHailDeductible) h += nqRR("Wind/Hail Deductible",d.windHailDeductible);
    if (d.accidentalDeathBenefit) h += nqRR("Accidental Death Benefit",d.accidentalDeathBenefit);
    if (d.scheduledProperty) h += nqRR("Scheduled Personal Property",d.scheduledProperty);
    h += '</div></div>';

  if (nqIsCommercial()) {

    h += nqRR("Business Name",d.bizName) + nqRR("FEIN",d.fein) + nqRR("Type",d.bizType) + nqRR("Years",d.yearsInBiz);
    h += nqRR("Employees",d.employees) + nqRR("Revenue",d.revenue);

    h += '</div></div>';
    // Commercial coverages
    if (d.glEachOccurrence || d.glGeneralAggregate || d.buildingValue || d.wcPartOne || d.commAutoBI) {
      h += '<div class="nq-review-section nq-review-purple"><div style="font-weight:700;font-size:13px;margin-bottom:8px;color:'+C.t1+';">Current Commercial Coverages</div><div class="nq-grid-2">';

      if (d.glGeneralAggregate) h += nqRR("GL General Aggregate",d.glGeneralAggregate);

      if (d.glPersonalAdvInjury) h += nqRR("Personal & Adv Injury",d.glPersonalAdvInjury);

      if (d.businessIncome) h += nqRR("Business Income",d.businessIncome);
      if (d.commAutoBI) h += nqRR("Comm Auto BI",d.commAutoBI);
      if (d.commAutoPD) h += nqRR("Comm Auto PD",d.commAutoPD);
      if (d.wcPartOne) h += nqRR("WC Part One",d.wcPartOne);

  // Uploaded files

// ══════════════════════════════════════════
// SUBMIT — Create AZ Lead + Email Christine + Log Tracker
// ══════════════════════════════════════════
function nqSubmit() {
  var d = nqData;
  var clientName = ((d.firstName||"")+" "+(d.middleName||"")+" "+(d.lastName||"")).replace(/\s+/g," ").trim();
  var lobStr = nqLobLabels().join(" + ");
  var carrierStr = d.carriers.length ? d.carriers.join(", ") : "All Carriers";
  var fullAddr = (d.address||"")+(d.city?", "+d.city:"")+(d.state?" "+d.state:"")+(d.zip?" "+d.zip:"");

  var btn = document.getElementById("nq-next");
  btn.textContent = "\u23F3 Submitting...";
  btn.disabled = true;

  var statusEl = document.getElementById("nq-submit-status");
  statusEl.style.display = "block";
  statusEl.innerHTML = '<div style="font-size:11px;font-weight:600;color:'+C.t1+';margin-bottom:8px;">Routing in progress...</div><div id="nq-submit-lines"></div>';

  function addLine(icon, text, color) {
    var el = document.getElementById("nq-submit-lines");
    if (!el) return;
    var div = document.createElement("div");
    div.className = "nq-status-line";
    div.style.color = color || C.t2;
    div.innerHTML = '<span>'+icon+'</span><span>'+text+'</span>';
    el.appendChild(div);
  }

  var results = { azOk:false, emailOk:false, trackerOk:false };

  // Step 1: Create AZ Lead
  addLine("\u23F3","Creating lead in AgencyZoom...",C.amber);
  var azPayload = {
    firstName: d.firstName, lastName: d.lastName,
    phone: d.phone, email: d.email, address: fullAddr,
    lobs: lobStr, notes: "From Command Center. Carriers: "+carrierStr
  };

  fetchGS("actionCreateAZLead", function(azResult) {
    var azId = "";
    if (azResult && azResult.ok && azResult.data) {
      azId = azResult.data.customerId || "";
      results.azOk = true;
      addLine("\u2705","Lead created in AgencyZoom"+(azId?" (ID: "+azId+")":""),C.green);
    } else {
      addLine("\u26A0\uFE0F","AgencyZoom: "+((azResult&&azResult.error)||"unknown")+" — add lead manually",C.amber);
    }

    // Step 2: Email Christine + Log to Tracker (single call)
    // actionSubmitQuote handles BOTH the detailed Pre-Filled email AND tracker logging
    addLine("\u23F3","Sending pre-filled quote to Christine & logging...",C.amber);
    var submitPayload = {
      clientName: clientName,
      firstName: d.firstName, middleName: d.middleName, lastName: d.lastName,
      coInsured: d.coInsured, dateOfBirth: d.dob,
      address: d.address, city: d.city, state: d.state, zip: d.zip,
      phone: d.phone, email: d.email, licenseNumber: d.dlNumber,
      lineOfBusiness: lobStr, lobs: lobStr, lob: d.lobs.join(","),
      carriers: carrierStr, carrier: carrierStr,
      effectiveDate: d.effectiveDate, expirationDate: d.expirationDate,
      currentCarrier: d.currentCarrier, currentPremium: d.currentPremium, policyNumber: d.policyNumber,
      vehicles: d.vehicles.filter(function(v){return v.year||v.make;}),
      drivers: d.drivers.filter(function(dr){return dr.name&&dr.name.trim();}),
      usage: d.usage, mileage: d.mileage, violations: d.violations,
      propertyAddress: d.propAddress, yearBuilt: d.yearBuilt,
      squareFootage: d.sqft, stories: d.stories,
      constructionType: d.construction, roofType: d.roofType,
      roofYear: d.roofYear, heatingType: d.heating,
      bodilyInjury: d.bodilyInjury, propertyDamage: d.propertyDamage,
      autoMedPay: d.autoMedPay, umUim: d.umUim, umPd: d.umPd,
      compDeductible: d.compDeductible, collisionDeductible: d.collisionDeductible,
      roadside: d.roadside, rentalDays: d.rentalDays,
      dwellingCoverage: d.dwelling, otherStructures: d.otherStructures,
      personalProperty: d.personalProperty, lossOfUse: d.lossOfUse,
      liability: d.liability, homeMedPay: d.homeMedPay,
      medPayPerPerson: d.medPayPerPerson, medPayPerOccurrence: d.medPayPerOccurrence,
      deductible: d.deductible, windHailDeductible: d.windHailDeductible,
      accidentalDeathBenefit: d.accidentalDeathBenefit, scheduledProperty: d.scheduledProperty,
      discounts: d.discounts,
      businessName: d.bizName, ein: d.fein, businessType: d.bizType,
      yearsInBusiness: d.yearsInBiz, numberOfEmployees: d.employees,
      annualRevenue: d.revenue, payroll: d.payroll,
      classCode: d.naics, operations: d.operations,
      glEachOccurrence: d.glEachOccurrence, glGeneralAggregate: d.glGeneralAggregate,
      glProductsCompOps: d.glProductsCompOps, glPersonalAdvInjury: d.glPersonalAdvInjury,
      buildingValue: d.buildingValue, bppContents: d.bppContents, businessIncome: d.businessIncome,
      wcPartOne: d.wcPartOne, wcElEachAccident: d.wcElEachAccident,
      commAutoBI: d.commAutoBI, commAutoPD: d.commAutoPD,
      umbrellaLimit: d.umbrellaLimit, underlyingAuto: d.underlyingAuto,
      underlyingHome: d.underlyingHome,
      umbrellaAutoCarrier: d.umbrellaAutoCarrier,
      umbrellaHomeCarrier: d.umbrellaHomeCarrier,
      umbrellaVehicles: d.umbrellaVehicles,
      umbrellaProperties: d.umbrellaProperties,
      umbrellaWatercraft: d.umbrellaWatercraft,
      notes: d.notes || ("Carriers: "+carrierStr+(azId?" | AZ: "+azId:"")),
      azCustomerId: azId,
      source: nqSource === "dec" ? "Dec Page Upload" : nqSource === "canopy" ? "Canopy Connect" : "Manual Entry",
      uploadedFiles: nqFiles.filter(function(f){return f.status==="done";}).map(function(f){return {name:f.name};})
    };

    fetchGS("actionSubmitQuote", function(sqResult) {
      if (sqResult && sqResult.ok) {
        results.emailOk = true;
        results.trackerOk = true;
        addLine("\u2705","Pre-filled quote emailed to Christine",C.green);
        addLine("\u2705","Logged to Quote Tracker",C.green);
      } else {
        addLine("\u26A0\uFE0F","Submit failed: "+((sqResult&&sqResult.error)||"unknown"),C.amber);
      }
      nqFinishSubmit(results, btn, clientName);
    }, function(sqErr) {
      addLine("\u274C","Submit failed: "+(sqErr&&sqErr.message||"error"),C.red);
      nqFinishSubmit(results, btn, clientName);
    }, submitPayload);

  }, function(err) {
    addLine("\u274C","AgencyZoom failed: "+(err&&err.message||"unknown"),C.red);
    nqFinishSubmit(results, btn, clientName);
  }, azPayload);
}

function nqFinishSubmit(results, btn, clientName) {
  var allOk = results.azOk && results.emailOk;
  var parts = [];
  if (results.azOk) parts.push("Lead in AZ"); else parts.push("AZ failed");
  if (results.emailOk) parts.push("Christine notified"); else parts.push("Email failed");
  if (results.trackerOk) parts.push("Tracker logged"); else parts.push("Tracker failed");

  var el = document.getElementById("nq-submit-lines");
  if (el) {
    var div = document.createElement("div");
    div.style.cssText = "margin-top:12px;padding:10px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;" +
      (allOk ? "background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.25);" : "background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.25);");
    div.innerHTML = '<span style="font-size:12px;font-weight:600;color:'+(allOk?C.green:C.amber)+';">'+(allOk?"\u2705 ":"\u26A0\uFE0F ")+parts.join(" | ")+'</span>';
    var resetBtn = document.createElement("button");
    resetBtn.className = "nq-btn nq-btn-next";
    resetBtn.style.cssText = "font-size:12px;padding:6px 14px;";
    resetBtn.textContent = "+ Start Another Quote";
    resetBtn.onclick = nqReset;
    div.appendChild(resetBtn);
    el.appendChild(div);
  }
  btn.textContent = allOk ? "\u2705 Submitted" : "\u26A0\uFE0F Partial";
  btn.disabled = true;
}
